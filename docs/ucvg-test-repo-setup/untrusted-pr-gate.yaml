# .ai-sdlc/untrusted-pr-gate.yaml — UCVG gate configuration template
#
# Copy this file to .ai-sdlc/untrusted-pr-gate.yaml in your target repository.
# All values below are sensible defaults. Only override what differs for your team.
#
# RFC-0043 — Untrusted-Contributor PR Verification Gate
# See docs/operations/e2e-real-repo-runbook.md for full setup instructions.

# ── Deployment mode (OQ-2 resolution) ─────────────────────────────────────────
#
# `deployment: ci`    — reviewers run inside CI-side Docker sandbox (default).
# `deployment: local` — reviewers run on maintainer's local machine.
#
# CI mode is recommended for most teams:
#   - Hermetic isolation (ephemeral runner; no local-machine state)
#   - Signing-key distance — signing key never in same environment as untrusted code
#   - Contributor latency — reviewers run in parallel to contributor's CI jobs

deployment: ci

# ── Stage 1: Protected-path rule engine ───────────────────────────────────────
#
# Paths matching these globs trigger `abort-protected-path` on mutation.
# Deny wins — any match aborts immediately without LLM or sandbox spin-up.
# Adjust for your repository layout.

protectedPaths:
  - '.github/**'
  - '**/.github/**'
  - '**/package.json'
  - '**/pnpm-lock.yaml'
  - '**/package-lock.json'
  - '**/yarn.lock'
  - '.ai-sdlc/**'

# Only files matching these globs may change in an untrusted PR.
# Add additional extensions your project uses (e.g. .py, .rb, .go).

allowedMutationGlobs:
  - '**/*.ts'
  - '**/*.tsx'
  - '**/*.js'
  - '**/*.jsx'
  - '**/*.md'

# Content-based heuristics run on files that passed path checks.
# Per OQ-6 boundary principle: only patterns with <1% false-positive AND
# cheap-deterministic-value over downstream LLM/sandbox detection.

contentHeuristics:
  packageJsonLifecycleScripts: abort
  newGithubActionUses: abort

# ── Stage 2/3: Sandbox configuration ─────────────────────────────────────────
#
# Compute driver per OQ-5 resolution.
# docker (default) | kata | gvisor | microvm
#
# GitHub Actions ubuntu-latest runners include Docker out-of-the-box.
# For stronger isolation (HIPAA / FedRAMP High / PCI-DSS Level 1), use microvm
# which is automatically selected by the RFC-0022 regime override.

sandboxDriver: docker

# Resource limits per OQ-3 resolution.
# Adjust wallClockSeconds and memoryGb for your test suite size.

differentialTest:
  resourceLimits:
    wallClockSeconds: 600
    cpuCores: 2
    memoryGb: 4
    networkDeny: true
