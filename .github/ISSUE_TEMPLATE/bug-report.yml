name: Bug Report
description: Report a bug in the AI-SDLC framework
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run '...'
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.

  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      description: Estimated complexity (1 = trivial, 5 = very complex).
      options:
        - '1'
        - '2'
        - '3'
        - '4'
        - '5'
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional context, logs, or screenshots.
