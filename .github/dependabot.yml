# Dependabot configuration — supply-chain hygiene for a low-runtime-dependency
# pnpm monorepo. Two ecosystems:
#   - npm: scans the root pnpm-lock.yaml (covers every workspace package) for
#     vulnerable / outdated dependencies.
#   - github-actions: keeps the SHA-pinned `uses:` references current and is the
#     ongoing maintenance mechanism for the commit-SHA pinning landed alongside
#     this file (Dependabot updates the SHA + the `# vN` comment together).
#
# Updates are grouped to keep PR volume low; security updates are never grouped
# so they surface individually for fast triage.
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # ci:no-issue-required → require-issue-link.yml bypass (bots have no issue).
    # The attestation gate exempts dependabot[bot] separately in ai-sdlc-gate.yml.
    labels:
      - dependencies
      - 'ci:no-issue-required'
    groups:
      # React must move in lockstep: react + react-dom require the EXACT same
      # version (the dashboard build hard-fails otherwise — "Incompatible React
      # versions"). Listed FIRST so every react package matches here and lands
      # in ONE PR, regardless of production/development dependency-type (which
      # otherwise split react and @types/react / react-dom into separate PRs).
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
    # react and react-dom DO NOT publish matching version numbers on every patch
    # (e.g. react ships 19.2.7 while react-dom's latest is still 19.2.6). The
    # dashboard requires the EXACT same version, so a patch-only react bump lands
    # mismatched and hard-fails the build. Ignore PATCH updates for the react
    # packages — minor/major react releases are coordinated and still flow (grouped
    # via the `react` group above).
    ignore:
      - dependency-name: 'react'
        update-types:
          - 'version-update:semver-patch'
      - dependency-name: 'react-dom'
        update-types:
          - 'version-update:semver-patch'
      - dependency-name: '@types/react'
        update-types:
          - 'version-update:semver-patch'
      - dependency-name: '@types/react-dom'
        update-types:
          - 'version-update:semver-patch'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - github-actions
      - 'ci:no-issue-required'
    groups:
      github-actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'ci(actions)'
