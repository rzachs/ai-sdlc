name: AI-SDLC Post Review Results (docs-only fallback)

# AISDLC-136: branch protection on `main` requires `Post Review Results` as a
# status check by name (alongside `CI OK` and `codecov/patch`). AISDLC-131
# added `paths-ignore` to ai-sdlc-review.yml so docs-only PRs (RFC drafts,
# backlog edits, READMEs) skip the 3-reviewer subagent fan-out. But that
# means the workflow never fires → never posts the required status check →
# PR is permanently un-mergeable (deadlock).
#
# This orthogonal workflow runs on EVERY pull_request, detects whether all
# changed files match the same docs-only paths-ignore predicate, and if so
# posts `Post Review Results: success` directly via the GitHub status API.
# For mixed PRs (docs + code) it exits cleanly — the regular ai-sdlc-review.yml
# handles them via its own analyze + report path.
#
# Reproduction case fixed: PR #166 (docs/rfc-0015-signoff-engineering-operator)
# was BEHIND main with all CI green except this required check missing.
# Required manual `gh api repos/.../statuses/<sha> -X POST` to unblock.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

# Share the concurrency group with ai-sdlc-review.yml so we don't race against
# its report job on mixed PRs. Different group on docs-only PRs is fine since
# the other workflow doesn't fire there.
concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  statuses: write
  pull-requests: read

jobs:
  post-docs-only-fallback:
    name: Post Review Results (docs-only)
    runs-on: ubuntu-latest
    steps:
      - name: Detect docs-only changeset
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Mirrors paths-ignore from ai-sdlc-review.yml + verify-attestation.yml,
          # PLUS .ai-sdlc/attestations/<sha>.dsse.json (envelope files are
          # metadata about review, not code — treated as docs-equivalent for
          # the fallback purpose; AISDLC-208).
          # Patterns:
          #   - spec/rfcs/**
          #   - docs/**
          #   - backlog/tasks/**
          #   - backlog/completed/**
          #   - .ai-sdlc/attestations/<sha>.dsse.json (envelope chore-commit files)
          #   - *.md (root-level only — gitignore semantics, single * doesn't match /)
          PATTERN='^(spec/rfcs/|docs/|backlog/tasks/|backlog/completed/|\.ai-sdlc/attestations/[^/]+\.dsse\.json$|[^/]+\.md$)'

          # Fetch changed file list. Use API to avoid full git checkout.
          FILES=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')

          if [ -z "${FILES}" ]; then
            echo "No changed files; not docs-only"
            echo "all_docs=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          ALL_DOCS=true
          while IFS= read -r f; do
            if ! echo "${f}" | grep -Eq "${PATTERN}"; then
              echo "Non-docs file detected: ${f}"
              ALL_DOCS=false
              break
            fi
          done <<< "${FILES}"

          echo "all_docs=${ALL_DOCS}" >> "${GITHUB_OUTPUT}"
          echo "---"
          echo "Files in PR:"
          echo "${FILES}" | sed 's/^/  - /'
          echo "---"
          echo "All docs-only: ${ALL_DOCS}"

      - name: Post Review Results status (success, docs-only)
        if: steps.detect.outputs.all_docs == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -X POST \
            -f state=success \
            -f context='Post Review Results' \
            -f description='docs-only PR (AISDLC-131 paths-ignore + AISDLC-136 fallback)' \
            -f target_url="${PR_URL}"
          echo "✓ Posted Post Review Results: success on ${HEAD_SHA}"

      - name: Skip (mixed PR — handled by ai-sdlc-review.yml)
        if: steps.detect.outputs.all_docs != 'true'
        run: |
          echo "PR contains non-docs files; ai-sdlc-review.yml will run normally."
          echo "This workflow exits cleanly without posting any status."
