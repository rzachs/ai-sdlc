name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # AISDLC-218 (revised): explicit types — keep `opened` (so direct-ready
    # PRs without `--draft` fire CI), keep `synchronize` + `reopened` (push +
    # reopen on ready PRs), add `ready_for_review` (canonical fire-once
    # trigger when a draft flips to ready). The job-level `draft == false`
    # guards skip draft opens, so adding `opened` doesn't reintroduce the
    # original 2-CI-runs-per-draft-PR problem.
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# AISDLC-368: opt the workflow into Node 24 for JavaScript actions to silence
# the actions/checkout@v4 + dorny/paths-filter@v3 Node 20 deprecation warning
# that appeared on every job. Pure annotation-suppression — no behavior change.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# AISDLC-218: skip every PR-event job when the PR is a draft. The guard
# allows push (no PR context) + merge_group (always non-draft) through.
jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    outputs:
      python: ${{ steps.filter.outputs.python || steps.fallback.outputs.python }}
      go: ${{ steps.filter.outputs.go || steps.fallback.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      # On merge_group, the queue head ref is ephemeral and gets deleted by
      # GitHub between when the workflow starts and when paths-filter tries
      # to fetch it. Skip the action there and force-enable both outputs so
      # downstream SDK tests run unconditionally on merge_group — same
      # effective behavior as a paths-changed=true result.
      - id: fallback
        if: github.event_name == 'merge_group'
        run: |
          echo "python=true" >> "$GITHUB_OUTPUT"
          echo "go=true" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'merge_group'
        with:
          filters: |
            python:
              - 'sdk-python/**'
              - 'conformance/**'
            go:
              - 'sdk-go/**'
              - 'conformance/**'

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  backlog-drift:
    # AISDLC-119: full-backlog drift gate. The husky pre-commit only
    # checks STAGED tasks, so drift introduced via merges (rebase
    # conflicts, sibling-PR overlaps, file moves outside the dev's
    # awareness) can still land. This step runs `backlog-drift check`
    # against the entire backlog so PRs that introduce repository-wide
    # drift fail at PR time rather than accumulating silently.
    #
    # AISDLC-125: PROMOTED FROM ADVISORY → REQUIRED.
    # PR #192 (AISDLC-148) bulk-cleaned the 297 pre-existing drift
    # issues that motivated the original advisory framing. Two changes
    # promote the gate:
    #   1. `continue-on-error: true` removed (failure now propagates).
    #   2. `backlog-drift` added to `ci-ok`'s `needs[]` (in this file)
    #      so a drift failure cascades into the legacy required check.
    # Operator action (separate, documented in PR body): add
    # `Backlog Drift` to `required_status_checks.contexts` via
    # `gh api ... PATCH .../branches/main/protection` so the check
    # surfaces as an independently-named required entry on the PR
    # checks tab. Cross-workflow `needs:` is not supported by GitHub
    # Actions, so adding `backlog-drift` to `ai-sdlc-gate.yml`'s
    # `ai-sdlc/pr-ready` rollup would require duplicating the job —
    # the explicit branch-protection context is the cheaper path.
    #
    # SEVERITY-AWARE FAILURE MODEL: `backlog-drift@0.1.3` exits 1 on
    # ANY issue including `info` (e.g. "dependency completed") and
    # `warning` (e.g. "referenced file modified after task was
    # completed"). For a CI gate, only `error` severity should block
    # — info/warning are informational signals that don't represent
    # the dangling-reference / orphan-placeholder failure modes the
    # gate exists to catch. We filter `--json` output via `jq` and
    # exit non-zero only when at least one `error`-severity issue is
    # present. Local pre-commit (`scripts/check-backlog-drift.sh`)
    # remains strict-on-staged-tasks: `AI_SDLC_SKIP_DRIFT_GATE=1` is
    # honored ONLY there, NOT in CI (this job has no env-based
    # short-circuit by design).
    name: Backlog Drift
    runs-on: ubuntu-latest
    # AISDLC-218: skip on draft PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run backlog-drift check (full repo, error-severity gate)
        # `backlog-drift` is not a workspace dep — it's a standalone CLI
        # used as project tooling (parity with how `backlog-cli` itself
        # is invoked). `npx` (without --no-install) downloads it on
        # demand; the package is small (~few hundred KB) so the cold
        # fetch is acceptable for this gate.
        #
        # Pinned to 0.1.3 — first version with the URL-fragment fix
        # (refs like `spec/rfc.md#section` no longer false-positive as
        # missing files). Pre-0.1.3 produced ~70% noise on our backlog.
        # See docs/upstream-bug-reports/backlog-drift-url-fragment-false-positive.md
        #
        # Exit semantics:
        #  - 0 → no `error`-severity issues (info/warning OK, printed)
        #  - 1 → one or more `error`-severity issues (e.g. dangling
        #        file reference, orphan `(new)` placeholder) — block
        #        the PR with the issue list in the job output.
        run: |
          set -euo pipefail
          # Capture JSON output (always exits 1 if any issue, regardless
          # of severity — that's why we don't fail-fast on the npx call).
          # `|| true` keeps the pipeline alive so we can post-process.
          json="$(npx backlog-drift@0.1.3 check --json 2>/dev/null || true)"
          # Pretty-print every issue for the job log so reviewers see
          # context regardless of which severity gates the run.
          npx backlog-drift@0.1.3 check || true
          # Count error-severity entries. `jq -e` returns non-zero when
          # the result is null/false/0, but we want explicit branching
          # so the message is readable in the GitHub UI.
          errors="$(printf '%s' "$json" | jq '[.[] | select(.severity == "error")] | length')"
          echo ""
          echo "[backlog-drift] error-severity issues: ${errors}"
          if [ "${errors}" != "0" ]; then
            echo "::error::Backlog drift gate failed: ${errors} error-severity issue(s) detected. Run \`npx backlog-drift check\` locally and \`npx backlog-drift fix --task <id>\` to auto-fix."
            exit 1
          fi
          echo "[backlog-drift] gate passed (info/warning issues are informational, not blocking)"

  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    # AISDLC-218: skip on draft PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      matrix:
        # AISDLC-368: dropped Node 20 to halve Build & Test wall time.
        # Node 22 is the canonical pin (engines.node ^22 across all packages);
        # Node 20 was advisory-only and added ~5min per PR with little signal.
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm validate-schemas

  test-python:
    name: Test Python SDK (${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      - run: ruff check src/
      - run: mypy src/
      - run: pytest

  test-go:
    name: Test Go SDK
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Test sdk-go
        working-directory: sdk-go
        run: go test ./... -v -count=1
      - name: Test sdk-go/operator
        working-directory: sdk-go/operator
        run: go test ./... -v -count=1

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    # AISDLC-218: skip on draft PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          # AISDLC-368: full clone so `vitest --changed origin/main` can
          # compute the diff and only run tests affected by changed files.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # AISDLC-368: PR coverage runs ONLY for tests that touch changed files
      # (vitest --changed origin/main). Cuts coverage job ~3-5min → ~30s on
      # small PRs. push/merge_group still run full coverage so the codecov
      # baseline stays accurate.
      - name: Coverage (PR — changed files only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main || true
          pnpm -r exec -- vitest run --coverage --changed origin/main || pnpm test:coverage
      - name: Coverage (push / merge_group — full)
        if: github.event_name != 'pull_request'
        run: pnpm test:coverage
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: .
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only run on push to main (not PRs from forks, which lack secrets)
    # AISDLC-218: AND in the draft guard so integration is skipped on draft PRs.
    if: >-
      (github.event_name == 'push' || github.event_name == 'merge_group' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read
      issues: read
      pull-requests: read
      statuses: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run integration tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @ai-sdlc/reference test

  ci-ok:
    name: CI OK
    if: always()
    needs: [lint, build-and-test, test-python, test-go, backlog-drift]
    runs-on: ubuntu-latest
    steps:
      - run: |
          # AISDLC-125: backlog-drift promoted from advisory to required
          # (PR #192/AISDLC-148 cleared the 297-issue backlog that
          # justified the exclusion). The job's `error`-severity-only
          # gate runs in `backlog-drift` above; failure of that job now
          # blocks `ci-ok` and therefore blocks merges via the standard
          # required-checks chain.
          results=("${{ needs.lint.result }}" "${{ needs.build-and-test.result }}" "${{ needs.test-python.result }}" "${{ needs.test-go.result }}" "${{ needs.backlog-drift.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "CI failed: found job with result '$result'"
              exit 1
            fi
          done
          echo "All checks passed"
