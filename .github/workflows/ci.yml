name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'sdk-python/**'
              - 'conformance/**'
            go:
              - 'sdk-go/**'
              - 'conformance/**'

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  backlog-drift:
    # AISDLC-119: full-backlog drift gate. The husky pre-commit only
    # checks STAGED tasks, so drift introduced via merges (rebase
    # conflicts, sibling-PR overlaps, file moves outside the dev's
    # awareness) can still land. This step runs `backlog-drift check`
    # against the entire backlog so PRs that introduce repository-wide
    # drift fail at PR time rather than accumulating silently.
    #
    # SEQUENCING NOTE (AISDLC-119 review feedback): main currently has
    # 259 pre-existing drift issues (from before AISDLC-119 shipped).
    # `continue-on-error: true` keeps this job advisory until the
    # one-time cleanup task lands; remove the flag after cleanup so
    # this becomes a hard gate via `ci-ok`'s needs.
    name: Backlog Drift
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run backlog-drift check (full repo)
        # `backlog-drift` is not a workspace dep — it's a standalone CLI
        # used as project tooling (parity with how `backlog-cli` itself
        # is invoked). `npx` (without --no-install) downloads it on
        # demand; the package is small (~few hundred KB) so the cold
        # fetch is acceptable for this gate.
        #
        # Pinned to 0.1.3 — first version with the URL-fragment fix
        # (refs like `spec/rfc.md#section` no longer false-positive as
        # missing files). Pre-0.1.3 produced ~70% noise on our backlog.
        # See docs/upstream-bug-reports/backlog-drift-url-fragment-false-positive.md
        run: npx backlog-drift@0.1.3 check

  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm validate-schemas

  test-python:
    name: Test Python SDK (${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      - run: ruff check src/
      - run: mypy src/
      - run: pytest

  test-go:
    name: Test Go SDK
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Test sdk-go
        working-directory: sdk-go
        run: go test ./... -v -count=1
      - name: Test sdk-go/operator
        working-directory: sdk-go/operator
        run: go test ./... -v -count=1

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:coverage
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: .
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only run on push to main (not PRs from forks, which lack secrets)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      issues: read
      pull-requests: read
      statuses: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run integration tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @ai-sdlc/reference test

  ci-ok:
    name: CI OK
    if: always()
    needs: [lint, build-and-test, test-python, test-go]
    runs-on: ubuntu-latest
    steps:
      - run: |
          # AISDLC-119: backlog-drift intentionally excluded from ci-ok
          # aggregation until the 259-issue cleanup ships. Job still runs
          # for visibility but its FAILURE result must not block merges.
          results=("${{ needs.lint.result }}" "${{ needs.build-and-test.result }}" "${{ needs.test-python.result }}" "${{ needs.test-go.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "CI failed: found job with result '$result'"
              exit 1
            fi
          done
          echo "All checks passed"
