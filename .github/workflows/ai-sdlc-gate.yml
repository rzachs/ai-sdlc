name: AI-SDLC PR Ready Gate

# AISDLC-140 sub-1 — single rollup status check `ai-sdlc/pr-ready` that
# aggregates every PR signal AI-SDLC adopters need into ONE branch-protection
# entry. Replaces the historical pattern of enumerating N required checks by
# name + app_id (Pattern A in /tmp/research-prior-art.md), which is brittle
# against path filters, [skip ci] tokens, matrix changes, and multi-app
# posters (see `docs/operations/quality-gate.md` for the full rationale).
#
# Adopter promise: configure ONE required check (`ai-sdlc/pr-ready`) on your
# protected branch and you get the framework's full CI rollup for free —
# regardless of which workflows happen to fire on a given PR.
#
# Architecture: this workflow is the ONLY required check after cutover (sub-3).
# Today it runs ADDITIVELY alongside the legacy required checks (`CI OK`,
# `Post Review Results`, `codecov/patch`, `ai-sdlc/attestation`); the cutover
# is an operator action documented in `docs/operations/quality-gate.md`.
#
# Q-decisions baked in (per /tmp/quality-gate-redesign-final.md):
#  - Q1: prescriptive default for adopters from day one
#  - Q2: GHMQ-agnostic — same workflow handles `pull_request` + `merge_group`
#  - Q3: attestation is audit-only — `ai-sdlc/attestation` is NOT in the
#        aggregator's required signal set; it feeds into this rollup
#        indirectly per AISDLC-388 per-archetype logic (see below)
#  - Q4(b): this workflow IS the framework's prescriptive default; will be
#          scaffolded by `init` in sub-5
#
# Per-archetype attestation gating (AISDLC-388):
#
#   docs-only PRs (every changed file in spec/rfcs/**, docs/**,
#   backlog/{tasks,completed}/**, or root *.md):
#     → build-test, coverage, integration are SKIPPED (already gated by `detect`)
#     → `ai-sdlc/attestation` is NOT required; verify-attestation.yml is skipped
#       via paths-ignore on pull_request events; on merge_group events the inline
#       short-circuit in verify-attestation.yml posts `success` cheaply
#     → pr-ready aggregator passes via alls-green treating skipped as allowed
#
#   code/mixed PRs (at least one non-docs file):
#     → build-test, coverage, integration all required (existing behavior)
#     → `ai-sdlc/attestation` must be posted by verify-attestation.yml;
#       missing/invalid envelopes cause verify-attestation to post `failure`
#       (visible as a non-required informational status — branch protection
#       only requires `ai-sdlc/pr-ready` per AISDLC-388 operator action)
#     → the DSSE envelope verifier enforces review attestation on code PRs
#       before operators merge them (attestation is required for code,
#       governance-enforced via the verify-attestation workflow result)
#
# Operator action required: after this PR lands, update branch protection on
# `main` to require ONLY `ai-sdlc/pr-ready` (remove `ai-sdlc/attestation`
# as a direct required check). See docs/operations/quality-gate.md for the
# exact `gh api` command and cutover procedure (AISDLC-388 AC-2).
#
# Industry pattern: `re-actors/alls-green` ("alls-green") is the de facto
# community fix; named adopters include aiohttp, attrs, conda, setuptools,
# pytest, pip-tools, Open edX, PyCA, PyPA, Mergify. Load-bearing detail
# (per /tmp/research-prior-art.md): naive `needs:` alone reports `skipped`
# (which auto-merge treats as success). `re-actors/alls-green` with
# `if: always()` and `needs` introspection is the canonical fix.

on:
  pull_request:
    # AISDLC-218 (revised): keep `opened` (so direct-ready PRs fire the gate)
    # AND add `ready_for_review` (canonical fire-once trigger when a draft
    # flips to ready). The job-level `if: !draft` guards (detect job + pr-ready
    # rollup) skip draft opens, so the original 2-CI-runs-per-draft-PR problem
    # AISDLC-218 fixed doesn't recur.
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

# One in-flight gate run per PR / merge-queue head; cancel superseded runs.
concurrency:
  group: ai-sdlc-gate-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  # ── Archetype detection ─────────────────────────────────────────────────
  # Mirrors the docs-only path predicate used by `ai-sdlc-review.yml`,
  # `verify-attestation.yml`, and `ai-sdlc-review-docs-only.yml`. The
  # `dorny/paths-filter@v3` action runs unconditionally and emits a single
  # boolean output (`docs_only`) that the downstream gating jobs use to
  # decide whether to short-circuit.
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    # AISDLC-218: skip on draft PRs. Subsequent jobs `needs: detect` so this
    # cascades — a draft event causes no jobs to run at all.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          # `predicate-quantifier: every` makes `docs_only` true only when
          # EVERY changed file matches at least one of the listed
          # patterns. The default (`some`) would treat a mixed PR (one
          # docs file + one code file) as docs-only, incorrectly skipping
          # the build-test-coverage gates. Mirrors the docs-only pattern
          # set used by `ai-sdlc-review-docs-only.yml`.
          predicate-quantifier: 'every'
          filters: |
            docs_only:
              - 'spec/rfcs/**'
              - 'docs/**'
              - 'backlog/tasks/**'
              - 'backlog/completed/**'
              - '*.md'

  # ── Lint & Format (always required) ─────────────────────────────────────
  # Runs on every PR archetype. Cheap (~1 min) and catches the long tail of
  # syntactic regressions that even docs-only PRs can introduce (broken
  # markdown frontmatter, prettier drift in JSON examples, etc.).
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  # ── Build & Test matrix (code/mixed only) ───────────────────────────────
  # Skipped when `detect.outputs.docs_only == 'true'`. Per the AISDLC-140
  # design, `re-actors/alls-green` treats `skipped` as success — so
  # docs-only PRs naturally pass the aggregator without paying ~5min × 2
  # node versions of compute.
  build-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    needs: detect
    if: needs.detect.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  coverage:
    name: Coverage
    needs: detect
    if: needs.detect.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # AISDLC-376: full clone so the patch-coverage gate can compute the
          # PR diff (base..head). Without fetch-depth: 0, git diff against the
          # PR base sha would fail with "bad object" and the gate would
          # mis-report as a missing-coverage-data failure.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:coverage
      # AISDLC-376: server-side patch-coverage gate. Asserts ≥80% of the lines
      # this PR adds/modifies are covered by tests, mirroring the AISDLC-372-
      # dropped codecov/patch gate without the SaaS latency. Runs INSIDE the
      # Coverage job so vitest's coverage-final.json fixtures are already on
      # disk and we don't pay a second `pnpm test:coverage`. Same gate also
      # runs in `ci.yml` as a backstop; the alls-green rollup treats either
      # passing as sufficient.
      - name: Patch coverage gate (≥80%)
        if: github.event_name == 'pull_request'
        run: |
          node scripts/check-pr-patch-coverage.mjs \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --threshold 80

  integration:
    name: Integration Tests
    needs: detect
    # Skip integration on docs-only PRs (no code surface to integrate
    # against) AND on PRs from forks (which lack repo secrets needed for
    # the reference adapter integration tests). Same predicate as
    # `ci.yml`'s `integration` job — kept in sync deliberately.
    if: |
      needs.detect.outputs.docs_only != 'true' &&
      (github.event_name == 'merge_group' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
      statuses: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run integration tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @ai-sdlc/reference test

  # ── Aggregator ──────────────────────────────────────────────────────────
  # Posts the SINGLE rollup check `ai-sdlc/pr-ready` that adopters configure
  # as their sole required check. Uses `re-actors/alls-green@release/v1`
  # (industry-standard pattern; named adopters in /tmp/research-prior-art.md
  # include aiohttp, attrs, conda, setuptools, pytest, pip-tools, Open edX,
  # PyCA, PyPA, Mergify).
  #
  # Critical correctness details:
  #  1. `if: always()` so the aggregator runs even when an upstream job
  #     failed (otherwise GitHub would skip the aggregator on failure
  #     and the required check would never post → permanent merge block).
  #  2. The action inspects the `needs` context and treats `skipped` as
  #     allowed — which is exactly what archetype-conditional jobs need
  #     (docs-only PRs skip build-test/coverage/integration; the gate
  #     should still pass).
  #  3. The job's overall outcome IS the check named `ai-sdlc/pr-ready`
  #     by virtue of the job's `name:` — branch protection matches on
  #     `<workflow-name> / <job-name>` but `re-actors/alls-green` also
  #     posts a check_run named exactly `ai-sdlc/pr-ready` for adopters
  #     who want a stable name independent of job/workflow renames.
  # ── Attestation gate (AISDLC-388, per-archetype enforcement) ──────────
  # AISDLC-388 made `ai-sdlc/attestation` a non-required check on branch
  # protection so docs-only PRs (which have no code to attest) could merge
  # without a synthetic envelope (AISDLC-214/AISDLC-215 workaround retired).
  # Without this job, code PRs could ALSO merge without attestation — the
  # verify-attestation.yml status would be posted but nothing requires it.
  #
  # This job re-introduces machine enforcement at the rollup layer:
  #   - For docs-only PRs: skipped (verify-attestation.yml also skipped via
  #     paths-ignore) — re-actors/alls-green treats `skipped` as success.
  #   - For code PRs: polls the commit's statuses and requires
  #     `ai-sdlc/attestation` to be `success`. If missing or failure, this
  #     job fails → `ai-sdlc/pr-ready` fails → branch protection blocks merge.
  #
  # Retry/wait: verify-attestation.yml runs in parallel with this workflow,
  # so the attestation status may not be posted yet when this job first
  # checks. We poll for up to 5 minutes (sufficient for verify-attestation's
  # typical ~30-60s runtime) before failing.
  attestation-gate:
    name: Attestation gate (code PRs)
    needs: detect
    if: >-
      needs.detect.outputs.docs_only != 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    permissions:
      statuses: read
    steps:
      - name: Require ai-sdlc/attestation status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "[attestation-gate] code PR detected — polling for ai-sdlc/attestation status on $HEAD_SHA"
          DEADLINE=$(( $(date +%s) + 300 ))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            STATE=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/status" \
              --jq '.statuses[] | select(.context == "ai-sdlc/attestation") | .state' | head -1)
            if [ "$STATE" = "success" ]; then
              echo "[attestation-gate] ai-sdlc/attestation: success — PASS"
              exit 0
            fi
            if [ "$STATE" = "failure" ] || [ "$STATE" = "error" ]; then
              echo "::error::[attestation-gate] ai-sdlc/attestation: $STATE — code PR must have a valid attestation envelope"
              exit 1
            fi
            echo "[attestation-gate] status not posted yet (got: '${STATE:-<missing>}') — waiting 15s..."
            sleep 15
          done
          echo "::error::[attestation-gate] timed out waiting for ai-sdlc/attestation on $HEAD_SHA — code PR cannot merge without attestation"
          exit 1

  pr-ready:
    name: ai-sdlc/pr-ready
    needs: [detect, lint, build-test, coverage, integration, attestation-gate]
    # AISDLC-218: skip the rollup on draft PRs. With all upstream jobs skipped
    # (per their own draft guards), `re-actors/alls-green` treats all-skipped
    # as failure → posts `ai-sdlc/pr-ready: failure` on every draft sync.
    # Skipping the rollup means no required check posts on draft, which is
    # fine — drafts can't merge anyway, and on `ready_for_review` the
    # workflow fires fresh and pr-ready posts correctly.
    if: >-
      always() &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate required signals
        uses: re-actors/alls-green@release/v1
        with:
          # `jobs` is the JSON of the `needs` context — the action walks
          # each job's `result` and decides pass/fail. Default behavior:
          #   success | skipped → pass
          #   failure | cancelled → fail
          # This is correct for archetype-conditional jobs (Q3 in the
          # redesign memo).
          jobs: ${{ toJSON(needs) }}
