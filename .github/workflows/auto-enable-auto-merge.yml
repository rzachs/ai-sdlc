name: Auto-enable auto-merge on PR open

# Enables GitHub's auto-merge (squash) on every new PR from a branch in this
# repo. Once required checks pass and required reviews are satisfied, GitHub
# squash-merges the PR directly — no merge queue involved.
#
# AISDLC-400 (2026-05-23): The GitHub merge queue was dropped. Operator
# architectural review determined the queue's benefits (serialized merges,
# pre-merge skew testing, atomic transactions) solve problems this repo does
# not have (1-5 PRs in flight, solo operator + agents, mostly disjoint files).
# Queue costs (1x throughput, 10-15 min update-branch CI re-run per PR,
# merge_group event complexity) were felt acutely. Direct auto-merge is now
# the merge path. Required checks (`ai-sdlc/pr-ready`, `Backlog Drift`) and
# squash-only repo settings provide equivalent safety. See
# docs/operations/merge-without-queue.md for the full rationale and rollback
# procedure.
#
# ── AISDLC-381: pull_request_target migration (fork-PR support) ──────
# This workflow fires on `pull_request_target` (NOT `pull_request`) so that
# fork PRs receive an elevated GITHUB_TOKEN. On `pull_request` events from
# forks, GitHub silently downgrades GITHUB_TOKEN (and secrets) to read-only
# regardless of the workflow's declared `permissions:` block — every
# `gh pr merge --auto` call against a fork PR returned HTTP 403 (Resource
# not accessible by integration), so fork PRs sat unarmed forever. The
# `pull_request_target` event runs in the target repo's context with full
# write permissions even for fork PRs (per AISDLC-377.X external-contributor
# UX). The same-repo / fork distinction at the JOB level (skip fork-armed
# auto-merge — see `Skip drafts, fork PRs, and release-please PRs` step
# below) is unchanged: we intentionally still SKIP arming auto-merge on
# fork PRs because drive-by contributors should never get auto-merge for
# free. The migration is purely about giving the workflow the right
# context to talk to the GitHub API at all (for status posting on the
# fork's commit-status thread on future task expansion).
#
# ── 5-point safety guard (AISDLC-381 — see docs/operations/operator-runbook.md
#    § Fork-PR workflow safety pattern) ────────────────────────────────
# 1. NO `actions/checkout` here. We never touch fork content. The workflow
#    only invokes `gh pr merge` / `gh api` against the target-repo's API.
# 2. Fork PR content is read as DATA only via `gh pr view --json ...` —
#    never executed.
# 3. NO `pnpm install` / `pnpm build` / script execution. This workflow
#    only makes API calls.
# 4. NO fork-provided actions. Every `uses:` here pins to a vetted action
#    from main (or the GitHub-hosted ubuntu-latest runner).
# 5. Secrets: `secrets.AI_SDLC_PAT` is intentionally NOT exposed to any
#    fork content (no checkout, no script run, no `env:` propagation to
#    a step that consumes fork-controlled input). The PAT is used solely
#    for the `gh pr merge` API call which is target-repo-scoped.
#
# Why `--squash` (AISDLC-400, 2026-05-23):
# With the merge queue dropped, we explicitly pass `--squash` so PRs
# always land as a single commit on main regardless of repo-default
# settings. This matches the previous queue behavior (queue used SQUASH
# strategy). Operator must also set "Default merge method: Squash" in
# Settings → General → Pull requests and disable merge commits + rebase
# merges there for defense-in-depth. See scripts/sync-branch-protection.sh
# for the idempotent automation.
#
# Why a workflow (vs the per-PR button): the repo-level "Allow auto-merge"
# setting just enables the BUTTON. It doesn't actually opt PRs into auto-merge.
# This workflow does the opt-in step automatically at PR creation.
#
# External (fork) PRs are excluded by the head-repo guard — they still
# require manual approval before any merge can happen, which is correct
# (drive-by malicious PRs shouldn't be granted auto-merge automatically).
#
# Trigger types include `synchronize` and `reopened` so force-pushes during
# the AI-SDLC pipeline (rebase onto main, attestation re-sign, conflict
# resolution) self-heal — every push that GitHub silently dismisses
# auto-merge from re-fires this workflow which re-enables it. `gh pr merge
# --auto` is idempotent (verified empirically: exit 0 + no error when
# auto-merge is already enabled), so no extra guard is needed (AISDLC-130).
#
# AISDLC-230 (2026-05-07): also re-fire on `check_suite.completed` and
# `status` events. Without these, when CI completes AFTER auto-merge was
# armed, GitHub's direct-merge admission logic can leave the PR sitting
# CLEAN + armed but never actually merged — operators report needing to
# manually `gh pr merge --disable-auto && gh pr merge --auto` to force a
# fresh evaluation. By re-running the disable-then-arm cycle on every CI
# completion, the workflow self-heals that staleness without operator
# intervention. The disable-then-arm cycle (vs bare `--auto`) is required
# because bare `--auto` is idempotent — calling it on an already-armed
# stale state is a no-op. `--disable-auto` followed by `--auto` is what
# clears GitHub's cached state and triggers immediate merge admission.

on:
  # AISDLC-381: migrated from `pull_request` to `pull_request_target` so
  # the workflow gets an elevated GITHUB_TOKEN on fork PRs (without it
  # every `gh pr merge` API call returned 403 for fork PRs). The
  # job-level `Skip drafts, fork PRs, and release-please PRs` step still
  # skips fork PRs from being armed — this migration only fixes the
  # workflow-context permission level, not the policy on fork auto-merge.
  pull_request_target:
    # AISDLC-218: include `ready_for_review` so this fires when the new
    # draft-PR flow flips a draft to ready (which is the FIRST time the PR
    # should arm auto-merge). The existing job-level `draft == false` guard
    # below correctly skips draft `opened` events.
    types: [opened, synchronize, reopened, ready_for_review]
  # AISDLC-230: re-fire when a check_suite completes so auto-merge is
  # re-evaluated after CI finishes. Same `--disable-auto` / `--auto`
  # cycle is what unsticks PRs that go CLEAN+armed-but-not-queued.
  # `check_suite` and `status` events ALWAYS run in target-repo context
  # already (they don't have the pull_request fork-token-downgrade quirk),
  # so they are unchanged by the AISDLC-381 migration.
  check_suite:
    types: [completed]
  # AISDLC-230: status events (used by some external CI providers like
  # Codecov) carry the same staleness risk. Inexpensive to handle: the
  # discover-PR step is gated to a single PR per head SHA.
  status:

permissions:
  # AISDLC-381 iter-2 MINOR (security-reviewer): `contents: write` was
  # dropped — this workflow only invokes `gh pr merge --auto` and
  # `gh pr view`, both of which need `pull-requests: write` only. There
  # is no `git push` / file write to `contents` at any point. Reducing
  # the surface limits blast radius under pull_request_target.
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Discover PR for this event
        id: discover
        env:
          GH_TOKEN: ${{ secrets.AI_SDLC_PAT }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          # AISDLC-381: both pull_request and pull_request_target events
          # expose the PR number under github.event.pull_request.number with
          # an identical payload schema, so the same accessor handles both.
          PR_NUMBER_FROM_PR_EVENT: ${{ github.event.pull_request.number }}
          # check_suite + status events expose the head SHA differently.
          # Either field is empty when the OTHER event fires; cat with || true
          # to keep the assignment non-fatal.
          HEAD_SHA: ${{ github.event.check_suite.head_sha || github.event.sha || github.sha }}
        run: |
          set -euo pipefail
          # AISDLC-381: match BOTH `pull_request` and `pull_request_target`
          # since the workflow's trigger was migrated to the latter for
          # fork-PR token elevation; the legacy `pull_request` branch is
          # kept for forward compatibility if the trigger is ever reverted.
          if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "pull_request_target" ]; then
            echo "pr=$PR_NUMBER_FROM_PR_EVENT" >> "$GITHUB_OUTPUT"
          else
            # Look up the open PR for this head SHA. Pick the first one
            # (multiple PRs sharing a head SHA is exotic — same-branch
            # forks are excluded later by the same-repo guard).
            PR=$(gh api "/repos/$GH_REPO/commits/$HEAD_SHA/pulls" --jq '.[] | select(.state == "open") | .number' | head -1)
            echo "pr=${PR:-}" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when no PR matches the event
        if: steps.discover.outputs.pr == ''
        run: |
          echo "[auto-enable] no open PR for this event — nothing to arm."

      - name: Skip drafts, fork PRs, and release-please PRs
        id: guard
        env:
          GH_TOKEN: ${{ secrets.AI_SDLC_PAT }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.discover.outputs.pr }}
          REPO: ${{ github.repository }}
        if: steps.discover.outputs.pr != ''
        run: |
          set -euo pipefail
          # Use the full `owner/repo` of the PR head (NOT the bare repo name).
          # Forks always preserve the bare name, so a bare-name comparison would
          # accept fork PRs and contradict the same-repo intent below.
          PR_INFO=$(gh pr view "$PR" --json isDraft,headRepositoryOwner,headRepository,headRefName \
            -q '{isDraft: .isDraft, headRefName: .headRefName, headFull: (((.headRepositoryOwner.login // "") + "/" + (.headRepository.name // "")) // "")}')
          IS_DRAFT=$(echo "$PR_INFO" | jq -r '.isDraft')
          HEAD_FULL=$(echo "$PR_INFO" | jq -r '.headFull')
          HEAD_REF=$(echo "$PR_INFO" | jq -r '.headRefName')
          if [ "$IS_DRAFT" = "true" ]; then
            echo "[auto-enable] PR #$PR is draft — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ "$HEAD_FULL" = "/" ] || [ -z "$HEAD_FULL" ]; then
            # Defensive: head repository was deleted or API returned an empty
            # shape. Refuse to arm — operator can re-arm manually if intended.
            echo "[auto-enable] PR #$PR has no resolvable head repository — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ "$HEAD_FULL" != "$REPO" ]; then
            echo "[auto-enable] PR #$PR is from a fork ($HEAD_FULL) — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif case "$HEAD_REF" in release-please--*) true ;; *) false ;; esac; then
            # release-please PRs accumulate version bumps + CHANGELOG entries
            # over multiple commits to main; the operator decides WHEN to cut
            # the release. Auto-arming would race that decision (the PR would
            # merge as soon as CI goes green on each push). Skip — operator
            # arms manually with `gh pr merge --auto <pr>` when ready.
            echo "[auto-enable] PR #$PR is a release-please PR ($HEAD_REF) — skipping. Arm manually when ready: gh pr merge --auto $PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh auto-merge (disable-then-arm to force re-evaluation)
        if: steps.discover.outputs.pr != '' && steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.AI_SDLC_PAT }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.discover.outputs.pr }}
        run: |
          # AISDLC-230: bare `gh pr merge --auto` is idempotent on
          # already-armed PRs and won't clear stale GitHub state, so
          # disable-then-arm is required to refresh direct-merge admission.
          # `|| true` on disable handles the "wasn't armed yet" case.
          #
          # AISDLC-400: explicit --squash flag. With the merge queue dropped,
          # we pass --squash directly so PRs always land as a single commit on
          # main regardless of repo-default settings drift.
          gh pr merge --disable-auto "$PR" 2>/dev/null || true
          gh pr merge --auto --squash "$PR"
