name: Verify MCP Bundle

# AISDLC-75: the ai-sdlc-plugin manifest loads `mcp-server/dist/bin.js` at
# runtime. Marketplace clones do NOT run `pnpm install`, so the committed
# bundle MUST exist, be valid ESM, run with no node_modules, and stay fresh.
# `scripts/verify-bundle.mjs` checks all four. Without this gate, a stale
# bundle silently breaks every governance hook + MCP tool in cached installs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # AISDLC-218: explicit types — drop implicit `opened` (draft opens),
    # add `ready_for_review` (canonical fire-once trigger).
    types: [synchronize, reopened, ready_for_review]
    paths:
      - 'ai-sdlc-plugin/**'
      - '.github/workflows/verify-mcp-bundle.yml'

concurrency:
  group: verify-mcp-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-bundle:
    name: Verify dist/bin.js
    runs-on: ubuntu-latest
    # AISDLC-218: skip on draft PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (workspace)
        run: pnpm install --frozen-lockfile
      - name: Build workspace deps (pipeline-cli is a workspace dep of mcp-server)
        # AISDLC-110: verify-bundle's freshness rebuild calls esbuild which
        # bundles @ai-sdlc/pipeline-cli — its dist/ must exist for esbuild
        # to resolve the import. CI only runs `pnpm install`, not `pnpm -r build`,
        # so we explicitly build the dep first. Without this, every PR that
        # touches the workspace fails the freshness rebuild step.
        run: pnpm --filter @ai-sdlc/pipeline-cli build
      - name: Verify committed bundle (presence, ESM, self-contained, fresh)
        run: pnpm --filter @ai-sdlc/plugin-mcp-server verify-bundle
