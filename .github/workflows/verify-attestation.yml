name: AI-SDLC Verify Review Attestation

# Reads the DSSE attestation at .ai-sdlc/attestations/<head-sha>.dsse.json,
# verifies the signature against any-of-N pubkeys in
# .ai-sdlc/trusted-reviewers.yaml, and verifies all predicate fields against
# current PR state (commit SHA, diff hash, policy hash, agent file hashes,
# schema version).
#
# AISDLC-193: this workflow posts the `ai-sdlc/attestation` commit status
# again (success when verifier returns valid; failure when invalid with
# reason in description). Branch protection on `main` requires this status
# to pass before merge.
#
# Stage-2 follow-up: `contentHashV3` is base-dependent (per-file delta hash
# includes baseBlobSha — see `pipeline-cli/src/incremental-review/incremental.ts:592`).
# When the merge queue rebases the PR onto a tip where sibling PRs touched
# the same files, the envelope can invalidate even though the PR's CONTENT
# is unchanged. AISDLC-193 stage 2 will introduce `contentHashV4` (per-file
# `{path, headBlobSha}` map, base-independent) to close that rebase gap.

on:
  # AISDLC-214: paths-ignore REMOVED. The required `ai-sdlc/attestation` status
  # must be posted on EVERY PR head SHA (including docs-only) so branch
  # protection doesn't deadlock. Docs-only PRs are short-circuited inside the
  # workflow via the docs-only detect step below — no envelope verify, just
  # post `success` directly.
  pull_request:
    # AISDLC-218 (revised): keep `opened` (so direct-ready PRs without `--draft`
    # fire the gate) AND add `ready_for_review` (canonical fire-once trigger
    # when a draft flips to ready). The job-level `if: !draft` guard skips
    # draft opens so verify-attestation doesn't post spurious failure before
    # the envelope is signed.
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  # AISDLC-113: also verify inside the merge-queue's gh-readonly-queue branch
  # so a sibling PR merging into the same files between PR-head verification
  # and merge-queue execution is still surfaced in the audit log.
  merge_group:
    types: [checks_requested]

concurrency:
  group: verify-attestation-${{ github.event.pull_request.number || github.event.merge_group.head_sha }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify attestation
    runs-on: ubuntu-latest
    # AISDLC-218: skip draft PRs (envelope only signed after `gh pr ready`).
    # release-please PRs are NOT skipped at job level — they need a posted
    # `ai-sdlc/attestation` status (branch-protection required check) so the
    # release PR can merge. Posting is handled by the inline release-please
    # short-circuit step below (symmetric with the docs-only short-circuit).
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft == false
    permissions:
      contents: read
      statuses: write
      # AISDLC-PR (release-please merge_group fix): the `Detect release-please
      # PR` step calls `gh pr view <N> --json headRefName` to look up the
      # source PR's branch name on merge_group events (the queue head_ref
      # `gh-readonly-queue/main/pr-<N>-<sha>` does not contain the source
      # branch name itself). That call needs `pull-requests: read` — without
      # it `github.token` returns 403 and the detection silently classifies
      # release-please PRs as non-release-please, recreating the loop the
      # short-circuit was added to prevent.
      pull-requests: read
    steps:
      # AISDLC-113: derive head/base SHAs from whichever event triggered us.
      # pull_request → github.event.pull_request.{head,base}.sha
      # merge_group  → github.event.merge_group.{head,base}_sha
      - name: Resolve subject SHA + base SHA from event payload
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            echo "head_sha=${{ github.event.merge_group.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "base_sha=${{ github.event.merge_group.base_sha }}" >> "$GITHUB_OUTPUT"
            echo "is_merge_group=true" >> "$GITHUB_OUTPUT"
          else
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "is_merge_group=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.head_sha }}

      # AISDLC-214: short-circuit on docs-only changesets (BOTH pull_request AND
      # merge_group). The former fallback workflow `verify-attestation-docs-only.yml`
      # used to handle pull_request docs-only by posting `ai-sdlc/attestation:
      # success` on the PR head SHA. After retiring that workflow, we MUST post
      # the same status here on docs-only PR HEADs or branch protection
      # deadlocks the PR (per docs/operations/quality-gate.md: paths-ignore-skipped
      # workflows leave their required check pending forever).
      #
      # Detection runs unconditionally; the short-circuit posts `success` and the
      # subsequent verify steps skip when all_docs == 'true'.
      - name: Detect docs-only changeset
        id: docs_only
        env:
          BASE_SHA: ${{ steps.resolve.outputs.base_sha }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          set -euo pipefail
          # -c core.quotePath=false emits raw UTF-8 filenames instead of C-quoted
          # form so non-ASCII paths match the DOCS_ONLY_PATTERN correctly
          # (AISDLC-205 round 3 fix — preserved from the retired fallback workflow).
          FILES=$(git -c core.quotePath=false diff --name-only "${BASE_SHA}...${HEAD_SHA}")
          if [ -z "${FILES}" ]; then
            echo "No changed files in changeset; treating as docs-only (nothing to attest)"
            echo "all_docs=true" >> "${GITHUB_OUTPUT}"
          else
            ALL_DOCS=$(printf '%s\n' "${FILES}" | node scripts/is-docs-only-changeset.mjs)
            echo "all_docs=${ALL_DOCS}" >> "${GITHUB_OUTPUT}"
            echo "Docs-only detection result: ${ALL_DOCS}"
            echo "Files: $(printf '%s\n' "${FILES}" | head -20 | sed 's/^/  - /')"
          fi

      - name: Short-circuit — post ai-sdlc/attestation success (docs-only)
        if: steps.docs_only.outputs.all_docs == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          set -euo pipefail
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -X POST \
            -f state=success \
            -f context='ai-sdlc/attestation' \
            -f description='docs-only changeset — attestation N/A (AISDLC-214)'
          echo "Posted ai-sdlc/attestation: success (docs-only short-circuit) on ${HEAD_SHA}"

      # release-please PRs change package.json versions + workspace
      # CHANGELOG.md files (NOT root *.md, so docs-only doesn't catch them).
      # The bot is a trusted internal source — version bumps don't carry
      # reviewable code, so attestation is N/A. Post `success` to satisfy
      # branch-protection without running the envelope verifier.
      #
      # Detection covers BOTH paths and is gated on TWO criteria
      # (defense-in-depth):
      #   1. The PR head branch starts with `release-please--` (the bot's
      #      canonical branch naming).
      #   2. The PR author identity matches a trusted release bot
      #      (`github-actions[bot]` or `release-please[bot]`).
      #
      # Why both: a same-repo user with push access could create a branch
      # named `release-please--bypass` and skip attestation if we relied on
      # branch name alone. Requiring the bot identity in addition closes
      # that hole. Fork PRs cannot exploit either check (the `gh api
      # .../statuses` POST would fail with the read-only token forks get
      # on `pull_request` events).
      #
      # Implementation:
      #   - pull_request: github.head_ref + github.event.pull_request.user.login
      #   - merge_group: github.event.merge_group.head_ref is
      #     `gh-readonly-queue/<base>/pr-<N>-<sha>`. Parse PR number, look up
      #     the source PR's head_ref + author.login via `gh pr view`, then
      #     check both. Requires `pull-requests: read` permission (declared
      #     above) — without it `gh pr view` returns 403 and detection fails.
      #
      # Failure handling: if `gh pr view` fails, exit the step with a clear
      # `::error::` log message. Fail-loud rather than silently classifying
      # as non-release-please (which would loop the merge queue with
      # reason `failed_checks` indefinitely). Operator can re-trigger after
      # diagnosing.
      #
      # The merge_group case is critical — without it, the queue commit's
      # required `ai-sdlc/attestation` status defaults to FAILURE
      # (no envelope on the rebased commit) and the queue removes the PR
      # with reason `failed_checks` in an infinite loop.
      - name: Detect release-please PR
        id: release_please
        if: steps.docs_only.outputs.all_docs != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_HEAD_REF: ${{ github.head_ref }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          set -euo pipefail
          IS_RP='false'

          # Trust signal: the `release-please--` branch-name prefix.
          #
          # We previously gated on BOTH the prefix AND a bot-identity allowlist
          # (github-actions[bot] / release-please[bot] / app/github-actions).
          # That broke the moment release-please-action started pushing under
          # `secrets.AI_SDLC_PAT` (PR #450) — the resulting PR's `user.login`
          # is the operator's identity (e.g. `deefactorial`), NOT a bot. Every
          # legit release-please PR fell through to full verification and
          # posted `contentHashV4 mismatch`.
          #
          # The defense-in-depth concern (a same-repo pusher could create a
          # branch named `release-please--evil` and bypass attestation) is
          # already mitigated by `auto-enable-auto-merge.yml`'s release-please
          # skip (PR #445): release-please PRs do NOT auto-merge. The operator
          # MUST manually arm `gh pr merge <N> --auto` to ship one. That
          # human-in-the-loop step IS the trust gate. If a contributor opens
          # a `release-please--evil` PR, the operator notices when reviewing
          # before manually arming.
          #
          # Net: branch-prefix-only trust matches the actual security model.
          # See PR #455 for the rationale + the security review verdict.

          # pull_request: branch prefix is sufficient
          case "${PR_HEAD_REF:-}" in
            release-please--*)
              IS_RP='true'
              echo "pull_request release-please match: head_ref='${PR_HEAD_REF}'"
              ;;
          esac

          # merge_group: parse PR number from queue branch, look up source
          # PR's head_ref. Allow multi-segment protected branch names
          # (e.g. `release/1.0`) — the queue branch is
          # `gh-readonly-queue/<base>/pr-<N>-<sha>`. GitHub passes the
          # merge_group head_ref WITH a `refs/heads/` prefix (witnessed in
          # workflow logs as `refs/heads/gh-readonly-queue/...`), so the
          # regex makes the prefix optional.
          if [ "$IS_RP" = 'false' ] && [ -n "${MERGE_GROUP_HEAD_REF:-}" ]; then
            PR_NUM=$(printf '%s' "$MERGE_GROUP_HEAD_REF" | sed -nE 's|^(refs/heads/)?gh-readonly-queue/.*/pr-([0-9]+)-[^/]*$|\2|p')
            if [ -n "$PR_NUM" ]; then
              # No `|| echo ''` — we want gh failure to fail the step loud.
              if SOURCE_HEAD_REF=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefName --jq '.headRefName'); then
                case "$SOURCE_HEAD_REF" in
                  release-please--*)
                    IS_RP='true'
                    echo "merge_group release-please match: PR=#${PR_NUM}, headRefName='${SOURCE_HEAD_REF}'"
                    ;;
                  *)
                    echo "merge_group: PR=#${PR_NUM} headRefName '${SOURCE_HEAD_REF}' is NOT release-please — falling through to full verification"
                    ;;
                esac
              else
                echo "::error::Failed to resolve source PR #${PR_NUM} for merge_group head_ref '${MERGE_GROUP_HEAD_REF}'. Verify the workflow's permissions block grants 'pull-requests: read'. Manual unblock: post 'ai-sdlc/attestation: success' on the queue commit and re-run."
                exit 1
              fi
            fi
          fi
          echo "is_release_please=${IS_RP}" >> "${GITHUB_OUTPUT}"
          echo "Release-please detection: head_ref='${PR_HEAD_REF:-}', merge_group_head_ref='${MERGE_GROUP_HEAD_REF:-}', is_release_please=${IS_RP}"

      - name: Short-circuit — post ai-sdlc/attestation success (release-please)
        if: steps.release_please.outputs.is_release_please == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          set -euo pipefail
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -X POST \
            -f state=success \
            -f context='ai-sdlc/attestation' \
            -f description='release-please version bump — attestation N/A'
          echo "Posted ai-sdlc/attestation: success (release-please short-circuit) on ${HEAD_SHA}"

      # Skip the full verify pipeline when EITHER short-circuit already posted
      # the success status above. These steps only run for code PRs or mixed PRs.
      - uses: pnpm/action-setup@v4
        if: steps.docs_only.outputs.all_docs != 'true' && steps.release_please.outputs.is_release_please != 'true'

      - uses: actions/setup-node@v4
        if: steps.docs_only.outputs.all_docs != 'true' && steps.release_please.outputs.is_release_please != 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install (orchestrator only — verifier needs the runtime barrel)
        if: steps.docs_only.outputs.all_docs != 'true' && steps.release_please.outputs.is_release_please != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build orchestrator + dependencies (verifier imports compiled JS)
        # `...` suffix builds @ai-sdlc/orchestrator AND its workspace deps
        # (notably @ai-sdlc/reference) in topological order. Without it the
        # orchestrator build fails with TS2307: cannot find @ai-sdlc/reference.
        if: steps.docs_only.outputs.all_docs != 'true' && steps.release_please.outputs.is_release_please != 'true'
        run: pnpm --filter "@ai-sdlc/orchestrator..." build

      - name: Verify attestation
        id: verify
        if: steps.docs_only.outputs.all_docs != 'true' && steps.release_please.outputs.is_release_please != 'true'
        env:
          PR_HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          PR_BASE_SHA: ${{ steps.resolve.outputs.base_sha }}
        run: node scripts/verify-attestation.mjs

      # AISDLC-193: post the `ai-sdlc/attestation` commit status. Branch
      # protection requires it; missing/invalid envelopes block merge.
      # Posts on BOTH the pull_request HEAD (direct verification) AND the
      # merge_group tip (queue-time re-verification with sibling-rebase
      # state) so a sibling PR merging into the same files between PR-head
      # verification and queue execution surfaces here.
      - name: Post ai-sdlc/attestation status
        # `always() && not-short-circuited` so the status is posted even when
        # the prior `Verify attestation` step throws (uncaught exception, OOM,
        # etc.), but NOT when one of the short-circuits (docs-only,
        # release-please) already posted success above. Without this, a
        # verifier crash leaves the gate UN-posted forever and the PR sits
        # BLOCKED with no surfaced reason. With this, a crash falls through
        # to STATE=failure with a clear "verifier crashed" reason — operator
        # sees red status, opens workflow log.
        if: always() && steps.docs_only.outputs.all_docs != 'true' && steps.release_please.outputs.is_release_please != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          STATUS: ${{ steps.verify.outputs.status }}
          REASON: ${{ steps.verify.outputs.reason }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          if [ "$STATUS" = "valid" ]; then
            STATE=success
            DESC="valid envelope at HEAD"
            echo "::notice::ai-sdlc attestation valid on $HEAD_SHA"
          elif [ -z "${STATUS:-}" ]; then
            # Verifier crashed before emitting status= to GITHUB_OUTPUT.
            STATE=failure
            DESC="verifier crashed before emitting result — see workflow logs"
            echo "::error::ai-sdlc attestation verifier crashed on $HEAD_SHA"
          else
            STATE=failure
            # GitHub status descriptions are truncated at 140 chars; trim.
            DESC="${REASON:0:130}"
            echo "::warning::ai-sdlc attestation $STATUS on $HEAD_SHA: $REASON"
          fi
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -X POST \
            -f state="$STATE" \
            -f context='ai-sdlc/attestation' \
            -f description="$DESC" \
            ${PR_URL:+-f target_url="$PR_URL"}
          echo "Posted ai-sdlc/attestation: $STATE on $HEAD_SHA"
