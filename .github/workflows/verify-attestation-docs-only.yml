name: AI-SDLC Verify Attestation (docs-only fallback)

# AISDLC-205: branch protection on `main` requires `ai-sdlc/attestation` as a
# status check (added 2026-05-05 per AISDLC-193 stage 1 + the operator's
# directive: "the attestation should be required for PR's to merge if it
# changes any code paths"). But `verify-attestation.yml` has `paths-ignore`
# that skips the workflow on docs-only PRs (RFC drafts, backlog edits,
# READMEs). Net: the required `ai-sdlc/attestation` status is never posted
# on those PRs → required check stays missing → PR is permanently
# un-mergeable (deadlock).
#
# This orthogonal workflow runs on EVERY pull_request, detects whether all
# changed files match the same docs-only paths-ignore predicate, and if so
# posts `ai-sdlc/attestation: success` directly via the GitHub status API
# with description "docs-only PR — attestation N/A". For mixed PRs (docs +
# code) it exits cleanly — the regular `verify-attestation.yml` handles
# them via its own verifier path.
#
# Reproduction case fixed: PR #333 (AISDLC-180 lifecycle close — file move
# from backlog/tasks/ to backlog/completed/) deadlocked at
# `ai-sdlc/attestation` missing immediately after the protection rule was
# tightened. Required manual `gh api repos/.../statuses/<sha> -X POST` to
# unblock. AND that manual post (attributed to a user, not the
# github-actions[bot] app_id 15368 the required check is bound to) DID NOT
# satisfy the gate — so even the manual escape hatch only worked once the
# protection's app_id constraint was relaxed. This workflow runs as
# github-actions[bot] (the same identity verify-attestation.yml uses), so
# its post matches the required-check app_id binding cleanly.
#
# Mirrors AISDLC-136's `ai-sdlc-review-docs-only.yml` near-verbatim — same
# detect + post pattern, just a different status context name + description.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  # AISDLC-205 (round 2): also fire on merge_group so we close the queue-side
  # deadlock. verify-attestation.yml ALSO triggers on merge_group with NO
  # paths-ignore — so without this trigger, a docs-only PR would pass the
  # PR-head check via the pull_request branch above, get enqueued, then
  # verify-attestation.yml fires on the queue commit, finds no envelope,
  # and posts `ai-sdlc/attestation: failure` → queue rejects → docs-only PR
  # is queue-deadlocked. Adding this trigger lets us race + win the post on
  # the queue commit when the changeset is docs-only.
  merge_group:
    types: [checks_requested]

# Share the concurrency group with verify-attestation.yml so we don't race
# against its verifier job on mixed PRs. Use the same fallback expression so
# both workflows key off the same value for both event types.
concurrency:
  group: verify-attestation-${{ github.event.pull_request.number || github.event.merge_group.head_sha }}
  cancel-in-progress: false

permissions:
  contents: read
  statuses: write
  pull-requests: read

jobs:
  post-docs-only-fallback:
    name: Verify attestation (docs-only)
    runs-on: ubuntu-latest
    # Skip release-please's own PRs/merge_group entries — same guard as
    # verify-attestation.yml so we don't post for branches that intentionally
    # carry no attestation.
    if: "!startsWith(github.head_ref, 'release-please--') && !contains(github.event.merge_group.head_ref || '', 'release-please--')"
    steps:
      # AISDLC-205 round 2: derive the SHA range we need to enumerate changed
      # files from. pull_request → use the PR Files API (no checkout needed).
      # merge_group → checkout the queue tip and use `git diff --name-only
      # <base>...<head>` because there's no PR number for the queue commit.
      - name: Resolve event-driven SHA + range
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            echo "head_sha=${{ github.event.merge_group.head_sha }}" >> "${GITHUB_OUTPUT}"
            echo "base_sha=${{ github.event.merge_group.base_sha }}" >> "${GITHUB_OUTPUT}"
            echo "is_merge_group=true" >> "${GITHUB_OUTPUT}"
          else
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "${GITHUB_OUTPUT}"
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "${GITHUB_OUTPUT}"
            echo "is_merge_group=false" >> "${GITHUB_OUTPUT}"
          fi

      # Only checkout for merge_group runs (PR runs use the GH API for file
      # enumeration which doesn't need a working tree).
      - name: Checkout (merge_group only)
        if: steps.resolve.outputs.is_merge_group == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.head_sha }}

      - name: Detect docs-only changeset
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          IS_MERGE_GROUP: ${{ steps.resolve.outputs.is_merge_group }}
          BASE_SHA: ${{ steps.resolve.outputs.base_sha }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          set -euo pipefail

          # Mirrors paths-ignore from ai-sdlc-review.yml + verify-attestation.yml,
          # PLUS .ai-sdlc/attestations/<sha>.dsse.json (envelope files are
          # metadata about review, not code — treated as docs-equivalent for
          # the fallback purpose; AISDLC-208).
          # Patterns:
          #   - spec/rfcs/**
          #   - docs/**
          #   - backlog/tasks/**
          #   - backlog/completed/**
          #   - .ai-sdlc/attestations/<sha>.dsse.json (envelope chore-commit files)
          #   - *.md (root-level only — gitignore semantics, single * doesn't match /)
          PATTERN='^(spec/rfcs/|docs/|backlog/tasks/|backlog/completed/|\.ai-sdlc/attestations/[^/]+\.dsse\.json$|[^/]+\.md$)'

          # Fetch changed file list. PR uses the API; merge_group uses git
          # diff against the queue commit's BASE..HEAD range (the queue tip
          # is our checked-out HEAD; the base SHA came from the event).
          #
          # AISDLC-205 round 3 fix: pass `-c core.quotePath=false` so non-ASCII
          # filenames are emitted as raw UTF-8 (matching the GH API path's
          # behavior), not C-style-quoted (e.g. `"docs/r\303\251sum\303\251.md"`).
          # Without this flag the docs-only regex (`^(spec/rfcs/|docs/|...`)
          # FAILS on quoted filenames because they start with `"`, not the
          # expected docs-prefix — creating the exact merge-group queue-side
          # deadlock this iteration was meant to close, but conditional on file
          # content (only triggers for non-ASCII paths). Test-reviewer caught
          # this in the iteration-2 review.
          if [ "${IS_MERGE_GROUP}" = "true" ]; then
            FILES=$(git -c core.quotePath=false diff --name-only "${BASE_SHA}...${HEAD_SHA}")
          else
            FILES=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')
          fi

          # AISDLC-205 round 3 fix: empty changeset = nothing-to-attest → post
          # success. Pre-fix this fell through to all_docs=false → no status
          # post → stranded the merge queue indefinitely on degenerate empty
          # diffs (queue-rebased PR whose content already existed on base, or
          # an actual zero-file PR). For pull_request events empty FILES is
          # also benign (no content to attest). Either way: post success.
          if [ -z "${FILES}" ]; then
            echo "No changed files; treating as docs-only (nothing to attest)"
            echo "all_docs=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          ALL_DOCS=true
          while IFS= read -r f; do
            if ! echo "${f}" | grep -Eq "${PATTERN}"; then
              echo "Non-docs file detected: ${f}"
              ALL_DOCS=false
              break
            fi
          done <<< "${FILES}"

          echo "all_docs=${ALL_DOCS}" >> "${GITHUB_OUTPUT}"
          echo "---"
          echo "Files in changeset (event=${{ github.event_name }}):"
          echo "${FILES}" | sed 's/^/  - /'
          echo "---"
          echo "All docs-only: ${ALL_DOCS}"

      - name: Post ai-sdlc/attestation status (success, docs-only)
        if: steps.detect.outputs.all_docs == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          # Target URL only meaningful on PR events; merge_group runs leave it blank.
          if [ -n "${PR_URL:-}" ]; then
            TARGET_URL_FLAG=(-f "target_url=${PR_URL}")
          else
            TARGET_URL_FLAG=()
          fi
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -X POST \
            -f state=success \
            -f context='ai-sdlc/attestation' \
            -f description='docs-only PR — attestation N/A (AISDLC-193 + AISDLC-205 fallback)' \
            "${TARGET_URL_FLAG[@]}"
          echo "✓ Posted ai-sdlc/attestation: success on ${HEAD_SHA}"

      - name: Skip (mixed PR — handled by verify-attestation.yml)
        if: steps.detect.outputs.all_docs != 'true'
        run: |
          echo "Changeset contains non-docs files; verify-attestation.yml will run normally."
          echo "This workflow exits cleanly without posting any status."
