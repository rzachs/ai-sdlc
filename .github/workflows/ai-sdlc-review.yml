name: AI-SDLC PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    # AISDLC-131: docs-only PRs (RFC drafts, backlog edits, READMEs) skip the
    # 3-reviewer subagent fan-out — those iterations don't need code review and
    # were burning ~3 reviewer-agent invocations per push (verified: 8 review
    # runs in ~1 hour on a single design-session PR = ~24 wasted invocations).
    # `paths-ignore` only skips the workflow when ALL changed files match, so
    # mixed PRs (docs + code) still trigger normally. To force a review on a
    # docs-only PR (e.g. external contributor scrutiny), use:
    #   gh workflow run ai-sdlc-review.yml --ref <branch>
    paths-ignore:
      - 'spec/rfcs/**'
      - 'docs/**'
      - 'backlog/tasks/**'
      - 'backlog/completed/**'
      - '*.md'

concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Job 0: Attestation precheck (cost-saver SOFT signal) ──────────
  # AISDLC-147 patch 1: when a valid `.ai-sdlc/attestations/<HEAD-sha>.dsse.json`
  # exists at HEAD (the operator already ran the 3 reviewers locally via
  # `/ai-sdlc execute` and signed the envelope), skip the 3 CI reviewer-agent
  # invocations and instead post auto-approved verdicts via the post-skip-results
  # job below.
  #
  # This is the COST-SAVING side restored after AISDLC-140 sub-4 demoted
  # attestation from a merge gate to audit-only. The merge-gate side stays
  # demoted — `verify-attestation.yml` is still log-only, `Post Review Results`
  # is still the only review-tier required check. We just stop burning ~$X of
  # Anthropic credits running a duplicate review when the operator already
  # cryptographically attested they ran it locally.
  attestation-precheck:
    name: Attestation precheck
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'release-please--')"
    permissions:
      contents: read
    outputs:
      # `true` when a valid envelope was found at HEAD — analyze job skips,
      # post-skip-results job runs. `false` when missing/invalid — the
      # existing analyze + report path runs unchanged.
      skip: ${{ steps.verify.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (verifier needs the orchestrator runtime barrel)
        run: pnpm install --frozen-lockfile

      - name: Build orchestrator + dependencies
        # `...` builds @ai-sdlc/orchestrator AND its workspace deps in topo order.
        # The verifier imports compiled JS from orchestrator/dist/runtime/.
        run: pnpm --filter "@ai-sdlc/orchestrator..." build

      - name: Verify attestation (same logic as verify-attestation.yml)
        id: verify
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # Run the canonical verifier — produces status=valid|invalid +
          # reason on $GITHUB_OUTPUT (handled by buildGithubOutputLines in
          # scripts/verify-attestation.mjs). We capture just the boolean
          # "should we skip the CI reviewers?" signal in a separate output.
          node scripts/verify-attestation.mjs > /tmp/verifier.log 2>&1 || true
          cat /tmp/verifier.log

          # Re-derive the skip decision by re-reading $GITHUB_OUTPUT. The
          # verifier appends a heredoc-shaped status=… block; we match the
          # final occurrence (defense-in-depth against an attacker padding
          # the reason with extra status= lines).
          STATUS=$(grep -E '^status=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          if [ "$STATUS" = "valid" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Attestation valid — skipping CI reviewer fan-out (cost-saver)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Attestation $STATUS — running CI reviewer fan-out"
          fi

  # ── Job 1: Parallel Review Analysis (sandboxed) ──────────────────
  # Has ANTHROPIC_API_KEY but NO GitHub write access.
  # Defense: even if the LLM is compromised, it cannot modify the repo.
  #
  # AISDLC-140 sub-4: removed the `check_attestation` short-circuit and the
  # CI-side attestor signing step. Attestation is now audit-only — the local
  # DSSE envelope (auto-signed by `.husky/pre-push`) is a provenance record,
  # not a merge gate. CI always runs the duplicate review so `Post Review
  # Results` posts deterministically and the `re-actors/alls-green` aggregator
  # (`ai-sdlc/pr-ready`) is the single merge gate. The `[skip ci]` chore-commit
  # loop that deadlocked PRs #176/#177 disappears with the attestor step.
  #
  # AISDLC-147 patch 1: gated on attestation-precheck. When the precheck
  # decides to skip (valid envelope at HEAD), this job is skipped and the
  # `post-skip-results` job below posts auto-approved verdicts directly.
  analyze:
    name: Analyze PR
    needs: [attestation-precheck]
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'release-please--') && needs.attestation-precheck.outputs.skip != 'true'"
    # AISDLC-142: analyze needs `pull-requests: read` to fetch existing PR
    # comments for the incremental-review marker. Read-only — write happens
    # in the `report` job (which already has `pull-requests: write`).
    permissions:
      pull-requests: read
    outputs:
      testing: ${{ steps.review.outputs.testing }}
      critic: ${{ steps.review.outputs.critic }}
      security: ${{ steps.review.outputs.security }}
      # AISDLC-141: classifier decision surfaced to the report job so the
      # PR body shows "Classifier decision: [<reviewers>] (confidence: N.NN)"
      # — operator visibility into when fan-out was scoped down vs. fell open.
      classifier_selected: ${{ steps.classify.outputs.selected }}
      classifier_confidence: ${{ steps.classify.outputs.confidence }}
      classifier_fell_open: ${{ steps.classify.outputs.fell_open }}
      # AISDLC-142: incremental-review decision so the report job can update
      # the marker comment after posting the verdicts.
      incremental_skip: ${{ steps.incremental.outputs.skip }}
      incremental_delta_only: ${{ steps.incremental.outputs.delta_only }}
      incremental_reason: ${{ steps.incremental.outputs.reason }}
      incremental_content_hash: ${{ steps.incremental.outputs.content_hash }}
      incremental_last_reviewed_sha: ${{ steps.incremental.outputs.last_reviewed_sha }}
      incremental_delta_size: ${{ steps.incremental.outputs.delta_size }}
      # AISDLC-147 patch 2: budget-exhaustion aggregate decision. Drives the
      # report job's "suppress CHANGES_REQUESTED on uniform Anthropic credit
      # exhaustion" branch. Values: 'skip-with-budget-comment' | 'proceed-as-normal'.
      budget_aggregate: ${{ steps.budget.outputs.aggregate }}
      budget_exhausted_count: ${{ steps.budget.outputs.exhausted_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Extract PR diff and linked issue
        id: context
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Generate the diff + a paths-only file for the classifier (AISDLC-141).
          git diff "$BASE_SHA"..."$HEAD_SHA" > /tmp/pr-diff.txt
          git diff --name-only "$BASE_SHA"..."$HEAD_SHA" > /tmp/pr-files.txt

          # Extract linked issue number from PR body (matches "Closes #N" pattern)
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(?:Closes|Fixes|Resolves)\s+#\K\d+' | head -1 || true)
          echo "issue_number=${ISSUE_NUM:-}" >> "$GITHUB_OUTPUT"

      # ── AISDLC-141: conditional review classifier (RFC-0010 §12) ─────
      # Decide which subset of {testing, critic, security} to run. The CLI
      # is fail-open: missing input → ALL_REVIEWERS; confidence < 0.7 →
      # ALL_REVIEWERS. So we never silently skip a review we should have
      # done. The calibration log entry is appended to
      # /tmp/classifier-artifacts/_classifier/calibration.jsonl for
      # offline inspection (uploaded as artifact below for cross-PR audit).
      - name: Classify PR (decide reviewer subset)
        id: classify
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p /tmp/classifier-artifacts
          # AISDLC-156: invoke the bin shim DIRECTLY via `node` instead of
          # `pnpm --filter ... exec`. `pnpm exec` does NOT resolve a workspace
          # package's OWN bin entries (only its DEPENDENCIES' bins are
          # symlinked into node_modules/.bin/), so the previous form silently
          # failed with `Command "cli-classify-pr" not found` and the
          # `|| echo` fallback fired on EVERY run — defeating the AISDLC-141
          # cost optimization. Direct node invocation removes the pnpm layer
          # and makes the fallback fire only on real CLI errors.
          # `|| echo ...` is the belt-and-braces fallback in case the binary
          # genuinely errors — emits a fellOpen=true ALL_REVIEWERS decision
          # and we proceed.
          CLASSIFIER_JSON=$(node pipeline-cli/bin/cli-classify-pr.mjs classify \
            --paths-file /tmp/pr-files.txt \
            --issue-id "PR-${PR_NUMBER}" \
            --artifacts-dir /tmp/classifier-artifacts 2>/tmp/classifier-stderr.txt \
            || echo '{"reviewers":["testing","critic","security"],"fellOpen":true,"fellOpenReason":"invocation-failed","confidence":0}')
          if [ -s /tmp/classifier-stderr.txt ]; then
            echo "::group::classifier stderr"
            cat /tmp/classifier-stderr.txt
            echo "::endgroup::"
          fi

          SELECTED=$(printf '%s' "$CLASSIFIER_JSON" | jq -r '.reviewers | join(" ")')
          CONFIDENCE=$(printf '%s' "$CLASSIFIER_JSON" | jq -r '.confidence')
          FELL_OPEN=$(printf '%s' "$CLASSIFIER_JSON" | jq -r '.fellOpen')
          echo "selected=${SELECTED}" >> "$GITHUB_OUTPUT"
          echo "confidence=${CONFIDENCE}" >> "$GITHUB_OUTPUT"
          echo "fell_open=${FELL_OPEN}" >> "$GITHUB_OUTPUT"
          echo "Classifier decision: [${SELECTED}] (confidence: ${CONFIDENCE}, fellOpen: ${FELL_OPEN})"

      - name: Fetch linked issue context
        if: steps.context.outputs.issue_number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue view ${{ steps.context.outputs.issue_number }} \
            --json title,body > /tmp/linked-issue.json 2>/dev/null || echo '{}' > /tmp/linked-issue.json

      - name: Create empty issue file if not fetched
        run: test -f /tmp/linked-issue.json || echo '{}' > /tmp/linked-issue.json

      # ── AISDLC-142: incremental review gate ─────────────────────────
      # Read the prior `<!-- ai-sdlc:last-reviewed-contenthash:... -->` marker
      # comment (if any) and decide whether to:
      #   - SKIP the review (contentHash unchanged since prior approval)
      #   - DELTA-ONLY review (`git diff <last-reviewed-sha>...HEAD`)
      #   - FULL review (first push, no marker, or delta over the safety cap)
      # The CLI is fail-open in the same shape as cli-classify-pr: any error
      # routes to FULL review so we never silently skip a review we should
      # have done.
      - name: Decide incremental review mode
        id: incremental
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # AISDLC-146 Layer 2 defense-in-depth: HMAC-SHA256 secret used by
          # cli-incremental-decide to verify v2 marker signatures. When set,
          # the CLI accepts v2 markers (rejecting any with mismatched HMAC);
          # when unset, v2 markers are rejected entirely + v1 markers parse
          # with a deprecation warning. The secret MUST be 32+ random bytes
          # — generate with `openssl rand -hex 32` and add via
          # `gh secret set MARKER_HMAC_SECRET`.
          MARKER_HMAC_SECRET: ${{ secrets.MARKER_HMAC_SECRET }}
        run: |
          # ── AISDLC-142 round-2 CRITICAL fix ────────────────────────
          # Fetch existing PR comments WITH author metadata, then filter to
          # trusted authors at the jq boundary. The unfiltered version
          # honored a forged `<!-- ai-sdlc:last-reviewed-contenthash:... -->`
          # marker posted by ANY GitHub user (including external fork-PR
          # contributors), letting them carry the publicly-computable
          # current contentHash → CLI returns skip:true → CI skips all
          # 3 reviewers → auto-approves → satisfies the required-merge-gate
          # check. The author-filter below is the primary defense (Layer 1).
          #
          # Trust criteria (either gate is sufficient):
          #   - login == "github-actions" (workflow-authored markers)
          #   - authorAssociation in {OWNER, MEMBER, COLLABORATOR}
          #     (push-access humans — they could write the marker via the
          #     workflow itself; honoring their direct comment is no escalation)
          #
          # Note: AISDLC-152 removed the legacy `ai-sdlc-ci-attestor` login
          # from this filter alongside the rest of the AISDLC-87 attestor
          # wiring. AISDLC-140 sub-4 made attestation audit-only; the bot
          # is no longer signing or commenting, so trusting its login here
          # is dead code.
          #
          # GraphQL `gh pr view --json comments` returns author.login
          # WITHOUT the [bot] suffix; the bot whitelist below matches that
          # form. Layer 2 (defense-in-depth) is the in-CLI re-filter via
          # --comments-json-file (`filterTrustedComments`).
          gh pr view "$PR_NUMBER" --json comments --jq '
            [
              .comments[]
              | select(
                  .author.login == "github-actions"
                  or .authorAssociation == "OWNER"
                  or .authorAssociation == "MEMBER"
                  or .authorAssociation == "COLLABORATOR"
                )
              | {
                  authorLogin: .author.login,
                  authorAssociation: .authorAssociation,
                  body: .body
                }
            ]
          ' > /tmp/pr-comments.json 2>/dev/null || echo '[]' > /tmp/pr-comments.json

          # Bodies-only mirror for the PRIOR_SHA grep below (already
          # author-filtered upstream — only trusted bodies make it here).
          jq -r '.[].body' /tmp/pr-comments.json > /tmp/pr-comments.txt 2>/dev/null \
            || : > /tmp/pr-comments.txt

          # Extract prior reviewedSha from the marker (if any) so we can
          # compute the delta numstat against it. Failure is fine — empty
          # PRIOR_SHA → no numstat → CLI takes the no-marker / full path.
          #
          # Wire formats handled (AISDLC-146):
          #   v0 (legacy AISDLC-142): <prefix><base64> -->
          #   v1 (transition):        <prefix>v1:<base64> -->
          #   v2 (HMAC):              <prefix>v2:<base64>:<hmac-hex> -->
          #
          # The regex captures everything between the prefix and ` -->` as
          # the "inner". A small awk strips the optional `vN:` prefix and
          # the trailing `:<hmac>` segment (v2 only) before base64-decoding.
          # Best-effort throughout — any failure routes to empty PRIOR_SHA
          # and the CLI takes the safe no-marker → FULL path.
          PRIOR_SHA=$(grep -oE '<!-- ai-sdlc:last-reviewed-contenthash:[^ ]+ -->' /tmp/pr-comments.txt 2>/dev/null \
            | tail -1 \
            | sed -E 's/^<!-- ai-sdlc:last-reviewed-contenthash:(.+) -->$/\1/' \
            | awk '
                {
                  inner = $0
                  # Strip leading "vN:" version tag (v1 + v2). v0 markers
                  # have no tag and pass through.
                  if (match(inner, /^v[12]:/)) {
                    inner = substr(inner, RLENGTH + 1)
                  }
                  # For v2, the HMAC segment is appended after the LAST `:`.
                  # base64url alphabet ([A-Za-z0-9_-]) never contains `:`,
                  # so the last colon is unambiguous. Strip it.
                  if ((idx = match(inner, /:[0-9a-fA-F]{64}$/)) > 0) {
                    inner = substr(inner, 1, idx - 1)
                  }
                  print inner
                }
              ' \
            | { read B64 && [ -n "$B64" ] && printf '%s' "$B64" \
                | base64 -d 2>/dev/null \
                | jq -r '.reviewedSha' 2>/dev/null; } || echo "")

          # AISDLC-151 (defense-in-depth follow-up to AISDLC-142 round 3):
          # Shell-side validate PRIOR_SHA BEFORE it enters any subprocess
          # invocation (`git diff PRIOR_SHA…HEAD` below). The TS-side
          # parseMarker enforces /^[0-9a-f]{40}$/i, but the bash-side jq
          # extraction trusts whatever the marker JSON carries. A trusted
          # COLLABORATOR could theoretically craft a marker with a
          # `reviewedSha` containing git-option-injection content (e.g.
          # `--upload-pack=evil`). The `...HEAD` suffix mitigates pure
          # option injection (git rejects the malformed arg), but explicit
          # shell-side hex-only validation is cheap insurance. On invalid
          # SHA we log a `::warning::` (operator visibility) and clear
          # PRIOR_SHA so the no-prior-SHA path runs (FULL review).
          #
          # Implementation note: we use bash `[[ =~ ]]` rather than
          # `printf | grep`. The `grep` form treats embedded newlines as
          # line separators, so a payload like `<40 valid hex>\n--evil`
          # matches line-1 against `^[0-9a-f]{40}$` and passes — letting
          # the rest smuggle through. `[[ =~ ]]` matches against the
          # whole string atomically.
          if [ -n "$PRIOR_SHA" ] && ! [[ "$PRIOR_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::warning::PRIOR_SHA from incremental-review marker failed shell-side hex validation (\"$PRIOR_SHA\"); falling back to FULL review"
            PRIOR_SHA=""
          fi

          : > /tmp/pr-delta-numstat.txt
          if [ -n "$PRIOR_SHA" ]; then
            # If PRIOR_SHA isn't reachable (rebase rewrote history), the diff
            # silently fails and the CLI routes to delta-too-large → FULL.
            git diff "$PRIOR_SHA"...HEAD --numstat > /tmp/pr-delta-numstat.txt 2>/dev/null \
              || : > /tmp/pr-delta-numstat.txt
          fi

          # Use the structured --comments-json-file path so the CLI applies
          # the trusted-author filter (Layer 2 defense-in-depth) on top of
          # the gh --jq filter above. Even if the jq filter is bypassed
          # somehow, the CLI-side filter still rejects forged markers.
          #
          # AISDLC-156: direct `node ./pipeline-cli/bin/...` invocation (NOT
          # `pnpm --filter ... exec`). See the matching note on the classify
          # step above + pipeline-cli/README.md "Invoking from CI" section.
          INCREMENTAL_JSON=$(node pipeline-cli/bin/cli-incremental-decide.mjs decide \
            --comments-json-file /tmp/pr-comments.json \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --head-ref HEAD \
            --repo-root . \
            --numstat-file /tmp/pr-delta-numstat.txt \
            --full-diff-paths-file /tmp/pr-files.txt 2>/tmp/incremental-stderr.txt \
            || echo '{"skip":false,"deltaOnly":false,"reason":"no-marker","currentContentHash":"","priorContentHash":null,"lastReviewedSha":null,"deltaSize":0}')
          if [ -s /tmp/incremental-stderr.txt ]; then
            echo "::group::incremental-decide stderr"
            cat /tmp/incremental-stderr.txt
            echo "::endgroup::"
          fi

          SKIP=$(printf '%s' "$INCREMENTAL_JSON" | jq -r '.skip')
          DELTA_ONLY=$(printf '%s' "$INCREMENTAL_JSON" | jq -r '.deltaOnly')
          REASON=$(printf '%s' "$INCREMENTAL_JSON" | jq -r '.reason')
          CONTENT_HASH=$(printf '%s' "$INCREMENTAL_JSON" | jq -r '.currentContentHash')
          LAST_SHA=$(printf '%s' "$INCREMENTAL_JSON" | jq -r '.lastReviewedSha // ""')
          DELTA_SIZE=$(printf '%s' "$INCREMENTAL_JSON" | jq -r '.deltaSize')
          echo "skip=${SKIP}" >> "$GITHUB_OUTPUT"
          echo "delta_only=${DELTA_ONLY}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          echo "content_hash=${CONTENT_HASH}" >> "$GITHUB_OUTPUT"
          echo "last_reviewed_sha=${LAST_SHA}" >> "$GITHUB_OUTPUT"
          echo "delta_size=${DELTA_SIZE}" >> "$GITHUB_OUTPUT"
          echo "Incremental decision: ${REASON} (skip=${SKIP}, deltaOnly=${DELTA_ONLY}, deltaSize=${DELTA_SIZE}, lastReviewedSha=${LAST_SHA:-none})"

          # Build the actual review-input file the next step uses. Skip path:
          # empty file (review step writes auto-approved verdicts directly).
          # Delta path: `git diff <prior-sha>...HEAD`. Full path: copy /tmp/pr-diff.txt.
          if [ "$SKIP" = "true" ]; then
            : > /tmp/review-diff.txt
          elif [ "$DELTA_ONLY" = "true" ] && [ -n "$LAST_SHA" ]; then
            git diff "$LAST_SHA"...HEAD > /tmp/review-diff.txt 2>/dev/null \
              || cp /tmp/pr-diff.txt /tmp/review-diff.txt
          else
            cp /tmp/pr-diff.txt /tmp/review-diff.txt
          fi

      - name: Run conditional review agents (classifier-gated subset)
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # AISDLC-141: only spawn the reviewers the classifier selected. The
          # subset is space-separated names from {testing, critic, security}.
          # Empty subset means the classifier scoped review entirely down (e.g.
          # 0 files changed) — we treat un-selected reviewers as auto-approved
          # with empty findings so the report job's gate logic stays unchanged.
          SELECTED: ${{ steps.classify.outputs.selected }}
          # AISDLC-142: incremental gate decision. When SKIP=true we spawn 0
          # reviewers (auto-approved with the prior-approval-reused summary).
          # When DELTA_ONLY=true the review reads /tmp/review-diff.txt
          # (computed by the `incremental` step) instead of /tmp/pr-diff.txt.
          INCR_SKIP: ${{ steps.incremental.outputs.skip }}
          INCR_DELTA_ONLY: ${{ steps.incremental.outputs.delta_only }}
          INCR_LAST_SHA: ${{ steps.incremental.outputs.last_reviewed_sha }}
          INCR_DELTA_SIZE: ${{ steps.incremental.outputs.delta_size }}
        run: |
          # Helper: spawn the dogfood reviewer for $TYPE in background. Reads
          # from /tmp/review-diff.txt — that file holds the FULL PR diff
          # (default), the DELTA diff (incremental delta-only), or is empty
          # (incremental skip). When delta-only, prepend a preamble so the
          # reviewer knows the prior full review still binds.
          run_review() {
            local TYPE="$1"
            local DIFF_FILE=/tmp/review-diff.txt
            if [ "$INCR_DELTA_ONLY" = "true" ]; then
              DIFF_FILE="/tmp/review-diff-${TYPE}.txt"
              {
                echo "## INCREMENTAL REVIEW (AISDLC-142)"
                echo ""
                echo "The FULL PR diff was reviewed earlier at SHA ${INCR_LAST_SHA}."
                echo "This incremental review only covers the delta from ${INCR_LAST_SHA} to HEAD"
                echo "(${INCR_DELTA_SIZE} lines). Your verdict still applies to the WHOLE PR — only"
                echo "the diff you read is scoped down."
                echo ""
                echo "## DELTA DIFF"
                echo ""
                cat /tmp/review-diff.txt
              } > "$DIFF_FILE"
            fi
            pnpm --filter @ai-sdlc/dogfood review \
              --pr "$PR_NUMBER" \
              --diff-file "$DIFF_FILE" \
              --issue-file /tmp/linked-issue.json \
              --type "$TYPE" > "/tmp/review-${TYPE}.txt" 2>"/tmp/review-${TYPE}-stderr.txt"
          }

          # Auto-approve verdict for un-selected reviewers (empty findings).
          # The schema must match what dogfood produces so the report job's
          # parser accepts it as a valid verdict.
          AUTO_APPROVED='{"approved":true,"findings":[],"summary":"Skipped by classifier (RFC-0010 §12) — change does not require this review type."}'

          # AISDLC-142: when the incremental gate says SKIP, write the
          # incremental auto-approved verdict for EVERY reviewer (whether or
          # not the classifier selected them). The report job's gate
          # semantics stay unchanged — three approved verdicts → APPROVE.
          if [ "$INCR_SKIP" = "true" ]; then
            # AISDLC-156: direct `node ./pipeline-cli/bin/...` invocation —
            # see notes on the classify + decide steps above.
            INCR_AUTO_APPROVED=$(node pipeline-cli/bin/cli-incremental-decide.mjs auto-approved-verdict \
              --reviewed-sha "$INCR_LAST_SHA" 2>/dev/null \
              || printf '%s' '{"approved":true,"findings":[],"summary":"Skipped by incremental review (AISDLC-142) — content unchanged."}')
            for TYPE in testing critic security; do
              printf '%s\n' "$INCR_AUTO_APPROVED" > "/tmp/review-${TYPE}.txt"
              : > "/tmp/review-${TYPE}-stderr.txt"
              echo "Incremental SKIP: writing auto-approved verdict for $TYPE (no reviewer agent invoked)"
            done
            # Skip the classifier-spawn loop entirely.
            TESTING=$(tail -1 /tmp/review-testing.txt 2>/dev/null || echo '{}')
            CRITIC=$(tail -1 /tmp/review-critic.txt 2>/dev/null || echo '{}')
            SECURITY=$(tail -1 /tmp/review-security.txt 2>/dev/null || echo '{}')
            echo "testing=$TESTING" >> "$GITHUB_OUTPUT"
            echo "critic=$CRITIC" >> "$GITHUB_OUTPUT"
            echo "security=$SECURITY" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Spawn each reviewer iff in $SELECTED; otherwise write the
          # auto-approved verdict directly. This preserves the existing
          # downstream contract (3 outputs: testing, critic, security) while
          # cutting the number of LLM invocations to len($SELECTED).
          PIDS=""
          for TYPE in testing critic security; do
            if printf ' %s ' "$SELECTED" | grep -qF " $TYPE "; then
              run_review "$TYPE" &
              PIDS="$PIDS $!"
            else
              printf '%s\n' "$AUTO_APPROVED" > "/tmp/review-${TYPE}.txt"
              : > "/tmp/review-${TYPE}-stderr.txt"
              echo "Skipping $TYPE reviewer — not in classifier subset [$SELECTED]"
            fi
          done

          # Wait for all spawned reviewers — don't fail if one errors.
          for PID in $PIDS; do
            wait "$PID" || true
          done

          # Log stderr in collapsed groups (only for reviewers that actually ran).
          for TYPE in testing critic security; do
            if [ -s "/tmp/review-${TYPE}-stderr.txt" ]; then
              echo "::group::${TYPE} review stderr"
              cat "/tmp/review-${TYPE}-stderr.txt"
              echo "::endgroup::"
            fi
          done

          # Capture last line of each output (the JSON verdict). For skipped
          # reviewers this is the AUTO_APPROVED line we wrote above.
          TESTING=$(tail -1 /tmp/review-testing.txt 2>/dev/null || echo '{}')
          CRITIC=$(tail -1 /tmp/review-critic.txt 2>/dev/null || echo '{}')
          SECURITY=$(tail -1 /tmp/review-security.txt 2>/dev/null || echo '{}')

          echo "testing=$TESTING" >> "$GITHUB_OUTPUT"
          echo "critic=$CRITIC" >> "$GITHUB_OUTPUT"
          echo "security=$SECURITY" >> "$GITHUB_OUTPUT"

      # ── AISDLC-147 patch 2: Anthropic API budget circuit breaker ─────
      # When the API key's credit balance hits $0, every reviewer fails with
      # HTTP 400 invalid_request_error carrying "credit balance is too low"
      # in the body. Without this classifier the report job would post
      # CHANGES_REQUESTED on every PR — noise that masks real failures.
      # Pipeline-cli's `cli-classify-budget` reads the 6 reviewer files
      # (3 stdout + 3 stderr) and emits a JSON aggregate decision:
      #   {"aggregate": "skip-with-budget-comment", "budgetExhaustedCount": 3, ...}
      # The report job below reads `aggregate` and branches on it.
      - name: Classify reviewer outputs (Anthropic budget circuit breaker)
        id: budget
        run: |
          # Always-on, never-fails: missing files → empty strings → other-failure
          # → aggregate=proceed-as-normal (the existing CHANGES_REQUESTED
          # safety net). The classifier guarantees `proceed-as-normal` on
          # any partial input set so a workflow regression can't silently
          # suppress a real failure.
          #
          # AISDLC-156: direct `node ./pipeline-cli/bin/...` invocation —
          # see notes on the classify + decide steps above. Pre-AISDLC-156
          # this used `pnpm --filter ... exec cli-classify-budget` which
          # silently failed (`Command not found`) on every run because pnpm
          # exec doesn't resolve workspace own-bins → the fallback below
          # fired unconditionally → `proceed-as-normal` aggregate → noisy
          # CHANGES_REQUESTED on every PR when the API key was exhausted
          # (defeating the AISDLC-147/154 circuit breaker entirely).
          BUDGET_JSON=$(node pipeline-cli/bin/cli-classify-budget.mjs \
            --testing-stdout /tmp/review-testing.txt \
            --testing-stderr /tmp/review-testing-stderr.txt \
            --critic-stdout /tmp/review-critic.txt \
            --critic-stderr /tmp/review-critic-stderr.txt \
            --security-stdout /tmp/review-security.txt \
            --security-stderr /tmp/review-security-stderr.txt \
            2>/tmp/budget-classifier-stderr.txt \
            || echo '{"aggregate":"proceed-as-normal","budgetExhaustedCount":0,"perReviewer":[]}')
          if [ -s /tmp/budget-classifier-stderr.txt ]; then
            echo "::group::budget-classifier stderr"
            cat /tmp/budget-classifier-stderr.txt
            echo "::endgroup::"
          fi

          AGGREGATE=$(printf '%s' "$BUDGET_JSON" | jq -r '.aggregate')
          EXHAUSTED=$(printf '%s' "$BUDGET_JSON" | jq -r '.budgetExhaustedCount')
          echo "aggregate=${AGGREGATE}" >> "$GITHUB_OUTPUT"
          echo "exhausted_count=${EXHAUSTED}" >> "$GITHUB_OUTPUT"
          echo "Budget classifier: aggregate=${AGGREGATE} exhausted=${EXHAUSTED}/3"
          if [ "$AGGREGATE" = "skip-with-budget-comment" ]; then
            # AISDLC-157: the gate fires when EVERY non-OK reviewer was
            # budget-exhausted (≥1 budget + 0 other-failure), not strictly
            # all 3. AISDLC-141's classifier may AUTO_APPROVE an unselected
            # reviewer (counted as ok), so the count below can be < 3.
            echo "::warning::${EXHAUSTED}/3 reviewers failed with Anthropic credit-exhausted (the rest succeeded — no real failures to surface). Report job will suppress CHANGES_REQUESTED and post idempotent budget-skip comment instead."
          fi

      - name: Upload classifier calibration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classifier-calibration-${{ github.event.pull_request.number }}
          path: /tmp/classifier-artifacts/_classifier/
          if-no-files-found: ignore
          retention-days: 30

  # ── Job 2: Post Reviews (write access, no LLM) ──────────────────
  # Has GitHub write access but NO ANTHROPIC_API_KEY.
  # Defense: this job only reads structured JSON — no LLM interaction.
  report:
    name: Post Review Results
    runs-on: ubuntu-latest
    needs: [analyze]
    if: always()
    permissions:
      pull-requests: write
      issues: read
      # AISDLC-147 patch 2 + AISDLC-157: post `Post Review Results: success`
      # status via the GitHub commit-status API when every NON-OK reviewer
      # failed with Anthropic credit-exhausted (suppress noisy
      # CHANGES_REQUESTED). The classifier-skipped reviewers
      # (AUTO_APPROVED stubs from AISDLC-141) count as ok, so this branch
      # can fire with as few as 1 budget-exhausted reviewer.
      statuses: write
    steps:
      - name: Skip if analyze was skipped (release-please PRs)
        if: needs.analyze.result == 'skipped'
        run: echo "Skipping review for release-please PR"

      # ── AISDLC-147 patch 2 + AISDLC-157: Anthropic budget circuit breaker ─
      # When every NON-OK reviewer failed with credit-exhausted (i.e.
      # `budget_aggregate == skip-with-budget-comment` — at least one
      # budget-exhausted reviewer AND zero other-failure reviewers),
      # suppress the noisy CHANGES_REQUESTED path. Instead post
      # `Post Review Results: success` directly via the status API +
      # idempotent comment marker explaining the skip.
      #
      # Mixed budget + other-failure (or zero budget) fall through to the
      # regular path below — the other-failure reviewer carries a real
      # signal (parse failure, reviewer crash, etc.) that the operator
      # needs to see surfaced as CHANGES_REQUESTED.
      #
      # AISDLC-157 broadened the gate from "all 3 budget-exhausted" because
      # AISDLC-141's classifier (LIVE since AISDLC-156) can AUTO_APPROVE an
      # unselected reviewer — that AUTO_APPROVED stub counts as `ok` here,
      # so a truly credit-exhausted run can have count<3 even when there's
      # nothing real to surface. The new rule handles that case cleanly.
      - name: Post budget-skip status + comment (Anthropic credit exhausted)
        if: needs.analyze.result == 'success' && needs.analyze.outputs.budget_aggregate == 'skip-with-budget-comment'
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          EXHAUSTED_COUNT: ${{ needs.analyze.outputs.budget_exhausted_count }}
        with:
          script: |
            const headSha = process.env.HEAD_SHA;
            const prUrl = process.env.PR_URL;
            const exhausted = process.env.EXHAUSTED_COUNT || '3';
            const prNumber = context.payload.pull_request.number;

            // Post the required `Post Review Results` status as success
            // so branch protection doesn't deadlock on the missing check.
            // Same shape as the docs-only fallback in
            // `ai-sdlc-review-docs-only.yml` — context name MUST match
            // exactly what branch protection requires.
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: headSha,
              state: 'success',
              context: 'Post Review Results',
              description: 'skipped (budget exhausted)',
              target_url: prUrl,
            });
            core.info(`Posted Post Review Results: success (budget-skip) on ${headSha}`);

            // Idempotent comment marker — find an existing comment with
            // our marker, update it instead of posting a new one. This
            // avoids spamming the PR thread on every push to a branch
            // whose API key is dead.
            const marker = '<!-- ai-sdlc:reviewer-skipped-by-budget -->';
            const body = [
              marker,
              '## AI-SDLC: Reviewer Agents Skipped (Anthropic Budget Exhausted)',
              '',
              `${exhausted}/3 review agents failed with HTTP 400 \`invalid_request_error\``,
              '("credit balance is too low"). The remaining agent(s) either succeeded or were',
              'skipped by the AISDLC-141 conditional classifier. Since every reviewer that',
              'DIDN\'T succeed only failed due to budget, the noisy CHANGES_REQUESTED has been',
              'suppressed.',
              '',
              '**What this means**:',
              '- This PR has been only partially reviewed by the automated agents.',
              '- Branch protection still requires `ai-sdlc/pr-ready` (the rollup gate),',
              '  but the `Post Review Results` status was posted as `success` so the gate',
              '  does not deadlock.',
              '- A human reviewer should manually validate this PR before merging,',
              '  or top up the Anthropic API credit balance and push again to re-trigger.',
              '',
              '*Posted by [AI-SDLC Review Agents](https://github.com/ai-sdlc-framework/ai-sdlc) — AISDLC-147 budget circuit breaker (AISDLC-157 broadened gate)*',
            ].join('\n');

            const { data: existing } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const prior = existing.find((c) => typeof c.body === 'string' && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
              core.info(`Updated existing budget-skip comment ${prior.id} on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Posted new budget-skip comment on PR #${prNumber}`);
            }

      - name: Validate and post reviews
        if: needs.analyze.result == 'success' && needs.analyze.outputs.budget_aggregate != 'skip-with-budget-comment'
        uses: actions/github-script@v7
        env:
          TESTING_JSON: ${{ needs.analyze.outputs.testing }}
          CRITIC_JSON: ${{ needs.analyze.outputs.critic }}
          SECURITY_JSON: ${{ needs.analyze.outputs.security }}
          CLASSIFIER_SELECTED: ${{ needs.analyze.outputs.classifier_selected }}
          CLASSIFIER_CONFIDENCE: ${{ needs.analyze.outputs.classifier_confidence }}
          CLASSIFIER_FELL_OPEN: ${{ needs.analyze.outputs.classifier_fell_open }}
        with:
          script: |
            // ── Parse and validate all three verdicts ─────────
            function parseVerdict(raw, type) {
              try {
                const v = JSON.parse(raw || '{}');
                if (typeof v.approved !== 'boolean' ||
                    !Array.isArray(v.findings) ||
                    typeof v.summary !== 'string') {
                  return { type, approved: false, findings: [{severity:'critical',message:'Invalid verdict schema'}], summary: 'Verdict parsing failed' };
                }
                return { ...v, type };
              } catch {
                return { type, approved: false, findings: [{severity:'critical',message:'Verdict JSON parsing failed'}], summary: 'Verdict not valid JSON' };
              }
            }

            const verdicts = [
              parseVerdict(process.env.TESTING_JSON, 'testing'),
              parseVerdict(process.env.CRITIC_JSON, 'critic'),
              parseVerdict(process.env.SECURITY_JSON, 'security'),
            ];

            const allApproved = verdicts.every(v => v.approved);
            const titles = { testing: 'Testing Review', critic: 'Code Quality Review', security: 'Security Review' };
            const sevIcons = { critical: '🔴', major: '🟠', minor: '🟡', suggestion: '💡' };

            // ── Separate findings into inline comments vs summary ──
            const inlineComments = [];
            const summaryFindings = [];

            for (const v of verdicts) {
              for (const f of v.findings) {
                const sev = f.severity || 'suggestion';
                const icon = sevIcons[sev] || '💡';
                const prefix = `${icon} **[${v.type}/${sev}]**`;

                if (f.file && f.line && Number.isInteger(f.line) && f.line >= 1) {
                  // Post as inline comment on the specific line. The
                  // diff-position check below filters out lines that
                  // exist in the file but are not part of the PR diff —
                  // GitHub rejects those with "Line could not be resolved".
                  inlineComments.push({
                    path: f.file,
                    line: f.line,
                    body: `${prefix} ${f.message}`,
                  });
                } else {
                  // No specific line (or file missing) — goes in summary.
                  // Previously this branch fell back to `line: 1` which
                  // produced 422s when line 1 wasn't in the diff hunks.
                  const fileNote = f.file ? ` (${f.file})` : '';
                  summaryFindings.push({
                    verdict: v,
                    finding: { ...f, message: `${f.message}${fileNote}` },
                    prefix,
                  });
                }
              }
            }

            // ── Build summary body ─────────────────────────────
            let body = `## AI-SDLC: Automated PR Review\n\n`;

            // AISDLC-141 (AC-8): surface the classifier decision so operators
            // see the fan-out savings (or the safety fall-open). Format:
            //   Classifier decision: [testing critic security] (confidence: 0.80)
            // or fell-open variant:
            //   Classifier decision: [testing critic security] (fellOpen: invocation-failed)
            const cSelected = (process.env.CLASSIFIER_SELECTED || '').trim();
            const cConfidence = (process.env.CLASSIFIER_CONFIDENCE || '').trim();
            const cFellOpen = (process.env.CLASSIFIER_FELL_OPEN || '').trim();
            if (cSelected || cConfidence) {
              const fellOpenSuffix = cFellOpen === 'true' ? ' (fellOpen)' : '';
              body += `_Classifier decision: [${cSelected}] (confidence: ${cConfidence})${fellOpenSuffix}_\n\n`;
            }

            body += allApproved
              ? `All three review agents **approved** this PR.\n\n`
              : `One or more review agents found issues.\n\n`;

            for (const v of verdicts) {
              const status = v.approved ? 'APPROVED' : 'CHANGES REQUESTED';
              body += `### ${titles[v.type]}: ${status}\n\n`;
              body += `${v.summary}\n\n`;
            }

            // Add non-inline findings to summary
            if (summaryFindings.length > 0) {
              body += `### General Findings\n\n`;
              for (const { prefix, finding } of summaryFindings) {
                body += `- ${prefix}: ${finding.message}\n`;
              }
              body += '\n';
            }

            body += '---\n';
            body += `*Reviewed by [AI-SDLC Review Agents](https://github.com/ai-sdlc-framework/ai-sdlc) — ${inlineComments.length} inline comments posted*`;

            // ── Post PR review with inline comments ──────────
            const event = allApproved ? 'APPROVE' : 'REQUEST_CHANGES';

            // GitHub requires comments to reference lines that appear in
            // the PR diff (added or modified). Filter out comments whose
            // file isn't in the diff AND comments whose line isn't in
            // any added-line range — both produce 422 "Line could not
            // be resolved". Findings that fail this check are demoted
            // to summary findings so the review still posts cleanly.
            let validComments = [];
            const demoted = [];
            try {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              // Map filename → set of added line numbers (post-image).
              // Parse the unified-diff `patch` and walk hunks to collect
              // the line numbers GitHub will accept for inline comments.
              const addedLinesByFile = new Map();
              for (const f of files) {
                const added = new Set();
                if (typeof f.patch === 'string') {
                  let curLine = 0;
                  for (const line of f.patch.split('\n')) {
                    const hunk = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                    if (hunk) {
                      curLine = Number(hunk[1]);
                      continue;
                    }
                    if (line.startsWith('+') && !line.startsWith('+++')) {
                      added.add(curLine);
                      curLine++;
                    } else if (line.startsWith(' ')) {
                      // Context line — counts toward post-image position.
                      curLine++;
                    }
                    // Removed lines ('-') don't advance the post-image counter.
                  }
                }
                addedLinesByFile.set(f.filename, added);
              }

              for (const c of inlineComments) {
                const added = addedLinesByFile.get(c.path);
                if (added && added.has(c.line)) {
                  validComments.push(c);
                } else {
                  // Demote to summary so the finding still surfaces.
                  demoted.push({
                    verdict: { type: 'review', summary: '' },
                    finding: { message: `${c.body} (${c.path}:${c.line})` },
                    prefix: '',
                  });
                }
              }
              const skipped = inlineComments.length - validComments.length;
              if (skipped > 0) {
                core.info(`Demoted ${skipped} inline comments to summary (line not in diff)`);
              }
            } catch (err) {
              core.warning(`Failed to list PR files, posting without inline comments: ${err.message}`);
            }

            // Append demoted findings to the summary body so they don't disappear.
            if (demoted.length > 0) {
              if (!body.includes('### General Findings')) {
                body = body.replace(
                  /---\n\*Reviewed by/,
                  `### General Findings\n\n` +
                    demoted.map(d => `- ${d.finding.message}`).join('\n') +
                    `\n\n---\n*Reviewed by`
                );
              } else {
                body = body.replace(
                  /---\n\*Reviewed by/,
                  demoted.map(d => `- ${d.finding.message}`).join('\n') +
                    `\n\n---\n*Reviewed by`
                );
              }
            }

            const postReview = async (comments) => {
              return github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event,
                body,
                comments,
              });
            };

            try {
              await postReview(validComments);
              core.info(`Posted ${event} review on PR #${context.payload.pull_request.number}`);
            } catch (err) {
              // GitHub returns 422 when GITHUB_TOKEN tries to approve a PR
              // created by the same identity (e.g. release-please using GITHUB_TOKEN).
              // Fall back to posting a comment instead.
              if (err.status === 422 && /approve your own/i.test(err.message)) {
                core.warning('Cannot self-approve PR — falling back to comment');
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body,
                });
                core.info(`Posted review as comment on PR #${context.payload.pull_request.number}`);
              } else if (err.status === 422 && /Line could not be resolved/i.test(err.message)) {
                // Last-resort fallback: our diff-position filter missed
                // an unresolvable line. Drop all inline comments, post
                // the summary review only — never lose the verdict.
                core.warning(
                  `Inline comments rejected by GitHub (${err.message}); retrying with summary-only review`,
                );
                await postReview([]);
                core.info(`Posted ${event} review (summary only) on PR #${context.payload.pull_request.number}`);
              } else {
                throw err;
              }
            }

      # ── AISDLC-142: update the incremental-review marker ─────────────
      # Idempotent upsert of the `<!-- ai-sdlc:last-reviewed-contenthash:... -->`
      # PR comment. Only fires when ALL reviewers approved (contentHash binds
      # to APPROVED states only — never to CHANGES_REQUESTED). Best-effort:
      # marker write failure at worst forces the next push back through a
      # FULL review; never a SAFETY regression.
      - name: Update incremental-review marker
        if: always() && needs.analyze.result == 'success' && needs.analyze.outputs.incremental_content_hash != ''
        uses: actions/github-script@v7
        env:
          TESTING_JSON: ${{ needs.analyze.outputs.testing }}
          CRITIC_JSON: ${{ needs.analyze.outputs.critic }}
          SECURITY_JSON: ${{ needs.analyze.outputs.security }}
          INCR_CONTENT_HASH: ${{ needs.analyze.outputs.incremental_content_hash }}
          # AISDLC-146 Layer 2 defense-in-depth: when set, the marker is
          # written in v2 wire format with an HMAC-SHA256 signature over
          # the JSON payload. When unset, falls back to v1 (no HMAC) so
          # operators who haven't provisioned the secret still get the
          # incremental-review savings — they just lose the HMAC integrity
          # gate. The v1→v2 cutover is per-PR (next push under v2 secret
          # rewrites the marker in v2), so no migration step is needed.
          MARKER_HMAC_SECRET: ${{ secrets.MARKER_HMAC_SECRET }}
        with:
          script: |
            // Verify all three reviewers approved before binding the marker.
            // A marker bound to a CHANGES_REQUESTED state would silently
            // suppress the next push's review.
            let allApproved = true;
            for (const key of ['TESTING_JSON', 'CRITIC_JSON', 'SECURITY_JSON']) {
              try {
                const v = JSON.parse(process.env[key] || '{}');
                if (!v.approved) allApproved = false;
              } catch { allApproved = false; }
            }
            if (!allApproved) {
              core.info('Skipping marker update — at least one reviewer did not approve.');
              return;
            }

            const headSha = context.payload.pull_request.head.sha;
            const contentHash = process.env.INCR_CONTENT_HASH;
            if (!/^[0-9a-f]{64}$/.test(contentHash || '')) {
              core.info(`Skipping marker update — invalid contentHash (${contentHash})`);
              return;
            }

            const payload = {
              contentHash,
              reviewedSha: headSha.toLowerCase(),
              reviewedAt: new Date().toISOString(),
            };
            const json = JSON.stringify(payload);
            const b64 = Buffer.from(json, 'utf-8').toString('base64url');
            // AISDLC-146 Layer 2 defense-in-depth: emit v2 (HMAC-SHA256
            // signed) when MARKER_HMAC_SECRET is provisioned, fall back
            // to v1 (no HMAC) when not. The HMAC input is the EXACT JSON
            // string we just base64'd so the verifier can re-derive it
            // by base64-decoding + recomputing HMAC under the shared
            // secret. Mirrors `formatMarker()` in
            // `pipeline-cli/src/incremental-review/incremental.ts` —
            // any change to the wire format here MUST be made there too.
            const hmacSecret = process.env.MARKER_HMAC_SECRET || '';
            let marker;
            if (hmacSecret.length > 0) {
              const { createHmac } = require('node:crypto');
              const hmac = createHmac('sha256', hmacSecret).update(json, 'utf-8').digest('hex');
              marker = `<!-- ai-sdlc:last-reviewed-contenthash:v2:${b64}:${hmac} -->`;
            } else {
              core.warning(
                'MARKER_HMAC_SECRET is not set — writing v1 (no HMAC) marker. ' +
                  'Provision via `gh secret set MARKER_HMAC_SECRET --body "$(openssl rand -hex 32)"` ' +
                  'to enable v2 integrity (AISDLC-146).',
              );
              marker = `<!-- ai-sdlc:last-reviewed-contenthash:v1:${b64} -->`;
            }
            const body =
              `## AI-SDLC: incremental review state\n\n` +
              `_Auto-managed by \`ai-sdlc-review.yml\` (AISDLC-142). ` +
              `Editing this comment will break incremental review for this PR ` +
              `until the next full review re-creates it._\n\n` +
              `${marker}\n`;

            const issue_number = context.payload.pull_request.number;
            // Idempotent: search existing comments for the marker prefix; update
            // in place if found, else create new. Mirrors `dor-ingress.yml`.
            //
            // ── AISDLC-142 round-2 CRITICAL fix (Layer 1) ──────────────
            // Filter to TRUSTED authors before selecting the prior marker.
            // Without this filter an attacker-planted comment (containing the
            // marker prefix substring) could be selected as `prior` and
            // either (a) mutated by our updateComment call OR (b) left in
            // place when the attacker's comment is "newer" than the bot's,
            // which would let the next push's analyze-job read the
            // attacker's marker first.
            //
            // REST API surface uses `user.login` (WITH `[bot]` suffix) +
            // `author_association` — different from the GraphQL surface
            // used in the analyze job's gh pr view step. Both flavors of
            // the github-actions login (`github-actions` and
            // `github-actions[bot]`) are listed for safety.
            //
            // AISDLC-152: removed the legacy `ai-sdlc-ci-attestor` /
            // `ai-sdlc-ci-attestor[bot]` entries alongside the rest of
            // the AISDLC-87 attestor wiring (AISDLC-140 sub-4 made
            // attestation audit-only; the bot is no longer signing or
            // commenting).
            const TRUSTED_LOGINS = new Set([
              'github-actions',
              'github-actions[bot]',
            ]);
            const TRUSTED_ASSOCIATIONS = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const isTrustedComment = (c) => {
              const login = c.user && c.user.login;
              const assoc = c.author_association;
              return (
                (login && TRUSTED_LOGINS.has(login)) ||
                (assoc && TRUSTED_ASSOCIATIONS.has(assoc))
              );
            };
            const existing = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const prior = existing.find(
              (c) =>
                c.body &&
                c.body.includes('<!-- ai-sdlc:last-reviewed-contenthash:') &&
                isTrustedComment(c),
            );
            try {
              if (prior) {
                if ((prior.body || '').includes(marker)) {
                  core.info('Marker unchanged — no-op.');
                  return;
                }
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: prior.id,
                  body,
                });
                core.notice(`Updated incremental-review marker comment ${prior.id} on PR #${issue_number}`);
              } else {
                const { data: created } = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  body,
                });
                core.notice(`Created incremental-review marker comment ${created.id} on PR #${issue_number}`);
              }
            } catch (err) {
              // Best-effort: don't fail the workflow if the comment write fails.
              core.warning(`Failed to upsert marker comment: ${err.message}`);
            }

      - name: Notify Slack that PR is ready for review
        # AISDLC-147 patch 2: skip Slack notify on budget-exhausted (the
        # in-PR comment + status are sufficient — Slack would misleadingly
        # report "all agents approved" because we set the status to success).
        if: always() && needs.analyze.result == 'success' && needs.analyze.outputs.budget_aggregate != 'skip-with-budget-comment'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TESTING_JSON: ${{ needs.analyze.outputs.testing }}
          CRITIC_JSON: ${{ needs.analyze.outputs.critic }}
          SECURITY_JSON: ${{ needs.analyze.outputs.security }}
        uses: actions/github-script@v7
        with:
          script: |
            const token = process.env.SLACK_BOT_TOKEN;
            if (!token) return;

            const pr = context.payload.pull_request;
            const prUrl = pr.html_url;
            const prTitle = pr.title;
            const prNumber = pr.number;

            // Check if all approved
            let allApproved = true;
            for (const key of ['TESTING_JSON', 'CRITIC_JSON', 'SECURITY_JSON']) {
              try {
                const v = JSON.parse(process.env[key] || '{}');
                if (!v.approved) allApproved = false;
              } catch { allApproved = false; }
            }

            const emoji = allApproved ? ':white_check_mark:' : ':warning:';
            const status = allApproved ? 'All agents approved' : 'Changes requested by agents';
            const action = allApproved ? 'Ready for human review and merge.' : 'Agent findings need attention before merge.';

            const message = `${emoji} *PR <${prUrl}|#${prNumber}: ${prTitle}>*\n${status}. ${action}`;

            await fetch('https://slack.com/api/chat.postMessage', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                channel: 'C0APASXUPM1',
                text: message,
              }),
            });

      - name: Comment on analyze failure
        if: needs.analyze.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '## AI-SDLC: Review Pipeline Failed\n\nThe automated review pipeline failed. See the [workflow run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.\n\n*Reviewed by [AI-SDLC Review Agents](https://github.com/ai-sdlc-framework/ai-sdlc)*'
            });

  # ── Job 3: Post auto-approved verdicts when attestation valid ────────
  # AISDLC-147 patch 1: when `attestation-precheck` decided to skip the
  # analyze fan-out (valid local DSSE envelope at HEAD), the analyze + report
  # jobs are skipped. The `report` job still emits its job-level check
  # (`Post Review Results: success`) because it runs to completion with all
  # steps skipped — branch protection is satisfied.
  #
  # This job adds the operator-facing surface: posts an APPROVE PR review
  # citing the attestation as the source of truth, AND posts an idempotent
  # comment marker explaining the skip. Without this, an operator scanning
  # the PR thread sees nothing (silent skip = confusing).
  post-skip-results:
    name: Post auto-approved verdicts (attestation valid)
    runs-on: ubuntu-latest
    needs: [attestation-precheck, analyze]
    if: |
      always() &&
      needs.attestation-precheck.result == 'success' &&
      needs.attestation-precheck.outputs.skip == 'true' &&
      needs.analyze.result == 'skipped'
    permissions:
      pull-requests: write
      issues: read
      # Defense in depth — also post the `Post Review Results` status via
      # the API so the check lands even if the `report` job's auto-emitted
      # job-level check is ever removed/renamed (e.g. by a future
      # restructuring). Same pattern as `ai-sdlc-review-docs-only.yml`.
      statuses: write
    steps:
      - name: Post Review Results status (auto-approved by attestation)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -X POST \
            -f state=success \
            -f context='Post Review Results' \
            -f description='auto-approved by local attestation (AISDLC-147)' \
            -f target_url="${PR_URL}"
          echo "✓ Posted Post Review Results: success on ${HEAD_SHA} (attestation cost-saver path)"

      - name: Post APPROVE review + idempotent comment marker
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- ai-sdlc:reviewer-skipped-by-attestation -->';
            const body = [
              marker,
              '## AI-SDLC: Reviewer Agents Skipped (Local Attestation Valid)',
              '',
              'A valid DSSE attestation envelope was found at',
              '`.ai-sdlc/attestations/<HEAD-sha>.dsse.json` for this commit. The 3 review',
              'agents were already run locally via `/ai-sdlc execute` and the verdict was',
              'cryptographically signed against:',
              '- Per-file content hash (`contentHashV3`)',
              '- Review policy hash',
              '- Reviewer agent file hashes',
              '- Plugin version',
              '',
              'CI re-running the same 3 agents would produce the same verdict at the cost',
              'of ~3 Anthropic API invocations. Per AISDLC-147 patch 1, we trust the local',
              'attestation as a SOFT signal and skip the duplicate review.',
              '',
              '_Note: Attestation remains AUDIT-ONLY as a merge gate (per AISDLC-140 sub-4)._',
              '_The `re-actors/alls-green` aggregator (`ai-sdlc/pr-ready`) is the single merge gate._',
              '',
              '*Posted by [AI-SDLC Review Agents](https://github.com/ai-sdlc-framework/ai-sdlc) — AISDLC-147 attestation cost-saver*',
            ].join('\n');

            // Idempotent comment — find prior by marker, update in place.
            const { data: existing } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const prior = existing.find((c) => typeof c.body === 'string' && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
              core.info(`Updated existing attestation-skip comment ${prior.id} on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Posted new attestation-skip comment on PR #${prNumber}`);
            }

            // Post a fresh APPROVE PR review so branch protection's
            // `dismiss_stale_reviews: true` doesn't strand auto-merge after
            // a force-push (mirrors the AISDLC-74 force-push recovery
            // documented in CLAUDE.md). We tolerate the 422 "approve your
            // own PR" failure mode the same way the report job does.
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: 'Auto-approved by valid local DSSE attestation (AISDLC-147 patch 1).',
              });
              core.info(`Posted APPROVE review on PR #${prNumber} (attestation cost-saver)`);
            } catch (err) {
              if (err.status === 422 && /approve your own/i.test(err.message)) {
                core.warning('Cannot self-approve PR — APPROVE review skipped (comment + status still posted)');
              } else {
                throw err;
              }
            }
