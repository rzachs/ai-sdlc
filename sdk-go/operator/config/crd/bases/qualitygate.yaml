apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: qualitygateresources.ai-sdlc.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
spec:
  group: ai-sdlc.io
  names:
    kind: QualityGateResource
    listKind: QualityGateResourceList
    plural: qualitygateresources
    singular: qualitygateresource
    shortNames:
      - qg
      - qualitygate
    categories:
      - ai-sdlc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [gates]
              properties:
                scope:
                  type: object
                  properties:
                    repositories:
                      type: array
                      items:
                        type: string
                    authorTypes:
                      type: array
                      items:
                        type: string
                gates:
                  type: array
                  items:
                    type: object
                    required: [name, enforcement, rule]
                    properties:
                      name:
                        type: string
                      enforcement:
                        type: string
                        enum: [advisory, soft-mandatory, hard-mandatory]
                      rule:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      override:
                        type: object
                        required: [requiredRole]
                        properties:
                          requiredRole:
                            type: string
                          requiresJustification:
                            type: boolean
                evaluation:
                  type: object
                  properties:
                    pipeline:
                      type: string
                    timeout:
                      type: string
                    retryPolicy:
                      type: object
                      required: [maxRetries]
                      properties:
                        maxRetries:
                          type: integer
                        backoff:
                          type: string
            status:
              type: object
              properties:
                compliant:
                  type: boolean
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
