apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: autonomypolicyresources.ai-sdlc.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
spec:
  group: ai-sdlc.io
  names:
    kind: AutonomyPolicyResource
    listKind: AutonomyPolicyResourceList
    plural: autonomypolicyresources
    singular: autonomypolicyresource
    shortNames:
      - ap
      - autonomypolicy
    categories:
      - ai-sdlc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [levels, promotionCriteria, demotionTriggers]
              properties:
                levels:
                  type: array
                  items:
                    type: object
                    required: [level, name, permissions, guardrails, monitoring]
                    properties:
                      level:
                        type: integer
                      name:
                        type: string
                      description:
                        type: string
                      permissions:
                        type: object
                        required: [read, write, execute]
                        properties:
                          read:
                            type: array
                            items:
                              type: string
                          write:
                            type: array
                            items:
                              type: string
                          execute:
                            type: array
                            items:
                              type: string
                      guardrails:
                        type: object
                        required: [requireApproval]
                        properties:
                          requireApproval:
                            type: string
                            enum: [all, security-critical-only, architecture-changes-only, none]
                          maxLinesPerPR:
                            type: integer
                          blockedPaths:
                            type: array
                            items:
                              type: string
                          transactionLimit:
                            type: string
                      monitoring:
                        type: string
                        enum: [continuous, real-time-notification, audit-log]
                      minimumDuration:
                        type: string
                promotionCriteria:
                  type: object
                  additionalProperties:
                    type: object
                    required: [minimumTasks, conditions, requiredApprovals]
                    properties:
                      minimumTasks:
                        type: integer
                      conditions:
                        type: array
                        items:
                          type: object
                          required: [metric, operator, threshold]
                          properties:
                            metric:
                              type: string
                            operator:
                              type: string
                            threshold:
                              type: number
                      requiredApprovals:
                        type: array
                        items:
                          type: string
                demotionTriggers:
                  type: array
                  items:
                    type: object
                    required: [trigger, action, cooldown]
                    properties:
                      trigger:
                        type: string
                      action:
                        type: string
                        enum: [demote-to-0, demote-one-level]
                      cooldown:
                        type: string
            status:
              type: object
              properties:
                agents:
                  type: array
                  items:
                    type: object
                    required: [name, currentLevel]
                    properties:
                      name:
                        type: string
                      currentLevel:
                        type: integer
                      promotedAt:
                        type: string
                      nextEvaluationAt:
                        type: string
                      metrics:
                        type: object
                        additionalProperties:
                          type: number
