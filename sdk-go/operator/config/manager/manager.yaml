apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sdlc-operator
  namespace: ai-sdlc-system
  labels:
    app.kubernetes.io/name: ai-sdlc-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-sdlc-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-sdlc-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: ai-sdlc-operator
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: ghcr.io/ai-sdlc-framework/operator:latest
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
