apiVersion: ai-sdlc.io/v1alpha1
kind: AdapterBinding
metadata:
  name: vault-secrets
spec:
  interface: SecretStore
  type: vault
  version: '2.0.0'
  source: 'registry.ai-sdlc.io/adapters/vault'
  config:
    address: https://vault.example.com
    mountPath: secret/data/ai-sdlc
    authMethod: kubernetes
