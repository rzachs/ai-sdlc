apiVersion: ai-sdlc.io/v1alpha1
kind: AdapterBinding
metadata:
  name: github-source-control
spec:
  interface: SourceControl
  type: github
  version: '1.0.0'
  source: 'registry.ai-sdlc.io/adapters/github'
  config:
    org: reliable-genius
    repo: main-service
    token:
      secretRef: github-token
  healthCheck:
    interval: 30s
    timeout: 5s
