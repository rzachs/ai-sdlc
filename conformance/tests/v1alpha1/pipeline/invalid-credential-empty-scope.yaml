apiVersion: ai-sdlc.io/v1alpha1
kind: Pipeline
metadata:
  name: invalid-creds
spec:
  triggers:
    - event: push
  providers:
    ci:
      type: github
  stages:
    - name: build
      agent: builder
      credentials:
        scope: []
        # Empty scope array — MUST fail validation (minItems: 1)
