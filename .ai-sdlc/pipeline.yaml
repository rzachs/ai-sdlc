apiVersion: ai-sdlc.io/v1alpha1
kind: Pipeline
metadata:
  name: dogfood-pipeline
  labels:
    ai-sdlc.io/component: dogfood
spec:
  triggers:
    - event: issue.labeled
      filter:
        labels:
          - ai-eligible
  providers:
    github:
      type: github
      config:
        org: ai-sdlc-framework
        repo: ai-sdlc
  stages:
    - name: validate-issue
      qualityGates:
        - dogfood-quality-gates
    - name: code
      agent: coding-agent
    - name: review
  routing:
    complexityThresholds:
      ai-with-review:
        min: 1
        max: 3
        strategy: ai-with-review
