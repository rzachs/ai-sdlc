apiVersion: ai-sdlc.io/v1alpha1
kind: Pipeline
metadata:
  name: dogfood-pipeline
  labels:
    ai-sdlc.io/component: dogfood
spec:
  triggers:
    - event: issue.labeled
      filter:
        labels:
          - ai-eligible
  providers:
    github:
      type: github
      config:
        org: ai-sdlc-framework
        repo: ai-sdlc
  stages:
    - name: validate-issue
      qualityGates:
        - dogfood-quality-gates
      onFailure:
        strategy: abort
        notification: gate-failure
    - name: code
      agent: coding-agent
      timeout: PT10M
      credentials:
        scope:
          - repo:read
          - repo:write
        ttl: PT15M
        revokeOnComplete: true
      onFailure:
        strategy: retry
        maxRetries: 2
        retryDelay: PT1M
        notification: agent-failure
    - name: review
      approval:
        required: true
        blocking: true
        timeout: PT24H
        onTimeout: abort
  priorityPolicy:
    enabled: true
    minimumScore: 0.05
    minimumConfidence: 0.2
    soulPurpose: 'Provide the open, vendor-neutral governance specification that enables enterprises to adopt AI coding agents with confidence, auditability, and predictability'
    dimensions:
      humanCurveWeights:
        explicit: 0.5
        consensus: 0.3
        decision: 0.2
    calibration:
      enabled: true
      lookbackPeriod: P30D
  routing:
    complexityThresholds:
      ai-with-review:
        min: 1
        max: 3
        strategy: ai-with-review
  branching:
    pattern: 'ai-sdlc/issue-{issueNumber}'
    targetBranch: main
    cleanup: on-merge
  pullRequest:
    titleTemplate: 'fix: {issueTitle} (#{issueNumber})'
    descriptionSections:
      - summary
      - changes
      - closes
    includeProvenance: true
    closeKeyword: Closes
  notifications:
    templates:
      gate-failure:
        target: issue
        title: 'AI-SDLC: Quality Gate Failed'
        body: '{details}'
      agent-failure:
        target: issue
        title: 'AI-SDLC: Agent Failed'
        body: 'Error during {stageName}: {details}'
      pr-created:
        target: issue
        title: 'AI-SDLC: PR Created'
        body: 'Pull request: {prUrl}'
      fix-ci-limit:
        target: pr
        title: 'AI-SDLC: Retry Limit Reached'
        body: 'Max fix attempts reached. Manual intervention needed.'
      complexity-too-high:
        target: issue
        title: 'AI-SDLC: Complexity Too High'
        body: 'Issue complexity ({score}) routed as "{strategy}" — requires human involvement.'
      fix-ci-success:
        target: pr
        title: 'AI-SDLC: Fix-CI Applied'
        body: 'Attempt {attempt} of {max} — pushed fixes to `{branch}`.'
