# RFC-0024 §15.1 — Capture Lifecycle Defaults + Classifier Config
#
# Copy this file to .ai-sdlc/capture-config.yaml to override defaults.
# All values below are the framework defaults — only override what differs
# for your team's velocity.
#
# Generated by: ai-sdlc init (AISDLC-278)

capture:
  # ── §15.1 Lifecycle timeboxes ──────────────────────────────────────────────
  #
  # "Not making a decision is a decision; the framework keeps work moving
  #  while respecting operator authority." (RFC-0024 §15.1)
  #
  # Every auto-action is reversible:
  #   - Draft auto-submit: reversible via `cli-capture redact <id>`
  #   - Pending-triage auto-classify: reversible via `cli-capture triage <id>`
  #   - Unknown-severity auto-classify: reversible via `cli-capture triage <id>`
  #   - Auto-archive: reversible via `cli-capture-lifecycle reactivate <id>`

  lifecycle:
    # OQ-1 — Days before an un-submitted draft is auto-submitted to team-shared.
    # A 100-issue/day team may want 1d; a few-issue/day team is fine at 7d.
    draftAutoSubmitDays: 7 # default: 7

    # OQ-2 — Days before a `triage: tbd` capture is auto-classified via the
    # Phase 2 Haiku classifier. Requires AI_SDLC_CLASSIFIER_INVOKER_MODULE.
    pendingTriageDays: 14 # default: 14

    # OQ-5 — Days before a `severity: unknown` capture is auto-classified.
    unknownSeverityDays: 14 # default: 14

    # OQ-9 — Stale notification ladder thresholds (triage: tbd captures).
    # Each threshold fires a progressively louder notification, then archives.
    staleNotificationLadder:
      tuiHighlightDays: 3 # TUI blocker pane highlight (default: 3)
      slackDmDays: 7 # Slack DM to capture owner (default: 7)
      emailDigestDays: 14 # Weekly Sunday email digest (default: 14)
      autoArchiveDays: 21 # Classify + archive to backlog/captures/archived/ (default: 21)

    # OQ-6 — Per-agent-role daily submission rate ceiling.
    # Soft warning only — full volume still reaches corpus (no drops).
    # Notification via Slack DM when ceiling is exceeded.
    rateCeiling:
      dailyCapPerAgentRole: 50 # default per role (default: 50)
      # Per-role overrides (optional). Keys are agent role names.
      # perAgentRoleOverrides:
      #   security-reviewer: 20  # stricter ceiling for security findings
      #   code-reviewer: 100     # looser ceiling if code-reviewer is chatty

  # ── Classifier substrate config ────────────────────────────────────────────
  #
  # Shared across OQ-2 / OQ-3 / OQ-5 / OQ-11 capture surfaces.
  # For the decision-recommendation task type, see .ai-sdlc/decisions-config.yaml.

  confidence:
    # OQ-2 — Confidence threshold above which AI-agent captures auto-submit.
    autoSubmitThreshold: 0.7 # default: 0.7


  # Classifier substrate settings (used by auto-triage + auto-severity).
  # classifier:
  #   threshold: 0.7             # global default confidence threshold
  #   model: claude-haiku-4-5    # Haiku-class model identifier
  #   dailyTokenCap: 1000000     # daily token cap (audit-only, not enforced)
  #   perTaskType:
  #     capture-triage:
  #       threshold: 0.75        # stricter for triage decisions
  #     capture-severity:
  #       threshold: 0.65        # slightly looser for severity hints
  #   perAgentRole:
  #     security-reviewer:
  #       threshold: 0.8         # security findings need higher confidence
