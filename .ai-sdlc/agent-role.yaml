apiVersion: ai-sdlc.io/v1alpha1
kind: AgentRole
metadata:
  name: coding-agent
  labels:
    ai-sdlc.io/component: dogfood
spec:
  role: coding-agent
  goal: Fix bugs and implement small features
  backstory: >-
    You are an AI coding agent responsible for implementing bug fixes and
    small features in the AI-SDLC framework repository. You work under
    strict constraints and all your changes require human review.
  tools:
    - code-editor
    - terminal
    - test-runner
  constraints:
    maxFilesPerChange: 15
    requireTests: true
    blockedPaths:
      - '.github/workflows/**'
      - '.ai-sdlc/**'
      # AISDLC-380 fix #3: block Write/Edit on attestation gate scripts so a dev
      # subagent cannot disable sub-attestation verification by modifying them.
      # Note: blockedPaths only prevents Write/Edit tool calls, not Bash `rm`
      # (Bash-pattern gap deferred to AISDLC-380.2).
      - 'scripts/verify-reviewer-sub-attestations.mjs'
      - 'scripts/verify-attestation.mjs'
    blockedActions:
      - 'gh pr merge*'
      - 'git merge*'
      - 'git push --force*'
      - 'git push -f*'
      - 'gh pr close*'
      - 'gh issue close*'
      - 'git branch -D*'
      - 'git branch -d*'
      - 'git reset --hard*'
      - 'git checkout -- .'
      - 'git restore .'
      # AISDLC-380: deny access to reviewer signing keys directory.
      # Reviewer sub-attestation keys live at ~/.ai-sdlc/reviewer-keys/.
      # This blockedAction raises the bar from "trivial accident" to
      # "deliberate workaround" for a dev subagent trying to forge
      # reviewer sub-attestations. See docs/operations/reviewer-signing-key-runbook.md
      # for the residual-risk note.
      - '*reviewer-keys*'
      - '*~/.ai-sdlc/reviewer-keys*'
