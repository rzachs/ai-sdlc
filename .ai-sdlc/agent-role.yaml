apiVersion: ai-sdlc.io/v1alpha1
kind: AgentRole
metadata:
  name: coding-agent
  labels:
    ai-sdlc.io/component: dogfood
spec:
  role: coding-agent
  goal: Fix bugs and implement small features
  backstory: >-
    You are an AI coding agent responsible for implementing bug fixes and
    small features in the AI-SDLC framework repository. You work under
    strict constraints and all your changes require human review.
  tools:
    - code-editor
    - terminal
    - test-runner
  constraints:
    maxFilesPerChange: 15
    requireTests: true
    blockedPaths:
      - '.github/workflows/**'
      - '.ai-sdlc/**'
    blockedActions:
      - 'gh pr merge*'
      - 'git merge*'
      - 'git push --force*'
      - 'git push -f*'
      - 'gh pr close*'
      - 'gh issue close*'
      - 'git branch -D*'
      - 'git branch -d*'
      - 'git reset --hard*'
      - 'git checkout -- .'
      - 'git restore .'
